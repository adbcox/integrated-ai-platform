schema_version: "1.0"
kind: "roadmap_item"
id: "RM-INV-002"
slug: "photo-driven-inventory-capability-mapping"
title: "Photo-driven inventory capture and capability mapping system"
category: "INV"
type: "capability_foundation"
status: "completed"
priority: "P1"

scoring:
  loe: 4
  strategic_value: 4
  architecture_fit: 4
  execution_risk: 2
  dependency_burden: 2
  readiness: 3

description: >
  Establish baseline for photo-driven asset inventory capture and capability
  mapping system that links physical/digital assets, components, consumables,
  and tools to roadmap execution work and system configuration.

why_it_matters: >
  Execution work must be grounded in real assets and capabilities. Without
  structured inventory capture and capability mapping, execution planning
  remains disconnected from actual resources. Baseline enables asset-driven
  planning and verification.

scope:
  objective: >
    Define asset capture structure with photo linkage, capability mapping
    structure, asset-to-execution linkage, and capability query posture.
  in_scope:
    - "asset inventory schema"
    - "photo metadata and linkage"
    - "component and consumables tracking"
    - "tool and equipment registry"
    - "capability mapping structure"
    - "asset-to-execution linkage"
  out_of_scope:
    - "real-time asset monitoring"
    - "vision model-driven OCR"
    - "vendor asset management integration"

