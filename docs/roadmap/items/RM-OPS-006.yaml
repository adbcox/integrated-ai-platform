    - integrated_ops_surface
    - policy_contract
    - validator_extension
    - roadmap_truth_sync
  validation_contract:
    required_validations:
    - id: run_integrated_ops_expansion
      command: python3 bin/run_integrated_ops_expansion.py
      pass_when: exit_code=0
    - id: validate_integrated_ops_expansion
      command: python3 bin/validate_integrated_ops_expansion.py
      pass_when: exit_code=0
    - id: targeted_pytest
      command: python3 -m pytest -q tests/test_integrated_ops_home_intel_inventory.py
      pass_when: exit_code=0
    - id: compute_next_pull
      command: python3 bin/compute_next_pull.py
      pass_when: exit_code=0
    - id: validate_roadmap_consistency
      command: python3 bin/validate_roadmap_consistency.py
      pass_when: exit_code=0
    - id: validate_roadmap_execution_contracts
      command: python3 bin/validate_roadmap_execution_contracts.py
      pass_when: exit_code=0
    - id: make_check
      command: make check
      pass_when: exit_code=0
    - id: make_quick
      command: make quick
      pass_when: exit_code=0
    - id: make_test_offline
      command: make test-offline
      pass_when: exit_code=0
    pass_criteria:
    - Integrated artifact contains home/intel/inventory/ops sections in one payload.
    - Runtime session linkage and control-window truth linkage are present.
  artifact_contract:
    required_artifacts:
    - artifacts/operations/integrated_ops_expansion_run.json
    - artifacts/validation/integrated_ops_expansion_validation.json
    evidence_outputs:
    - Unified queue and evidence are generated in one run.
    - Validator confirms all four roadmap IDs are linked in output.
    machine_readable_outputs:
    - artifacts/operations/integrated_ops_expansion_run.json
    - artifacts/validation/integrated_ops_expansion_validation.json
  completion_contract:
    substep_complete_when:
    - Single-path integrated run and validator are implemented.
    bounded_slice_complete_when:
    - All validations in validation_contract pass.
    - Required artifacts exist.
    item_complete_when:
    - Operational expansion path is operator-usable, governed, and evidence-backed.
    blocker_chain_cleared_when:
    - No direct blocker remains for integrated ops/home/intel/inventory execution
      path.
    small_patch_is_not_completion: true
  truth_surface_updates_required:
  - docs/roadmap/items/RM-OPS-006.yaml
  - docs/roadmap/items/RM-HOME-005.yaml
  - docs/roadmap/items/RM-INTEL-003.yaml
  - docs/roadmap/items/RM-INV-003.yaml
  - docs/roadmap/data/roadmap_registry.yaml
  - docs/roadmap/data/sync_state.yaml
  - docs/roadmap/ROADMAP_STATUS_SYNC.md
  - docs/roadmap/ROADMAP_MASTER.md
  - docs/roadmap/ROADMAP_INDEX.md
  - artifacts/planning/next_pull.json
  - artifacts/planning/blocker_registry.json
  - governance/roadmap_dependency_graph.v1.yaml
  external_dependency_readiness:
    required: false
    readiness_status: not_applicable
    blocks_autonomous_execution: false
    blocking_dependencies: []
