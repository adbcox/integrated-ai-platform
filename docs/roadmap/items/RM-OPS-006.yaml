description: 'Deliver one operator-facing operational layer that reuses governed runtime
  and control-window truth to run a unified intake->analysis->decision->evidence path
  spanning home intents, intelligence watch recommendations, and inventory/procurement
  decision support.

  '
why_it_matters: 'This prevents feature-island drift by centralizing next-tier operations
  in one governed execution surface instead of separate runtime paths.

  '
scope:
  objective: 'Implement a single integrated operational path tied to runtime session
    semantics, control-window truth, and machine-readable evidence.

    '
  in_scope:
  - integrated ops runtime helper module
  - single run command producing one machine-readable artifact
  - policy-governed home/intel/inventory semantics
  - validator proving integrated evidence and item linkage
  out_of_scope:
  - parallel home runtime
  - ungoverned external automations
  - multi-system speculative refactor
