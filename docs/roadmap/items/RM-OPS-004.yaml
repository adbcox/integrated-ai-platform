    max_loc_delta: 500
    allowed_change_kinds:
      - "governance_contract"
      - "validation_artifact"
      - "roadmap_item_contract"
  validation_contract:
    required_validations:
      - id: "validate_execution_contracts"
        command: "python3 bin/validate_roadmap_execution_contracts.py"
        pass_when: "status=PASS"
      - id: "validate_roadmap_consistency"
        command: "python3 bin/validate_roadmap_consistency.py"
        pass_when: "exit_code=0"
    pass_criteria:
      - "Execution contract validator passes for required item set."
      - "Roadmap consistency validation remains green."
  artifact_contract:
    required_artifacts:
      - "governance/backup_restore_schema.v1.yaml"
      - "artifacts/validation/roadmap_execution_contract_validation.json"
    evidence_outputs:
      - "Backup/restore governance schema remains declared in execution package refs."
      - "Validation artifact proves completion contract fields are populated."
    machine_readable_outputs:
      - "artifacts/validation/roadmap_execution_contract_validation.json"
  completion_contract:
    substep_complete_when:
      - "Operational-truth update requirements are explicitly listed."
    bounded_slice_complete_when:
      - "Validation contract passes."
      - "Artifact contract outputs are present."
    item_complete_when:
      - "Backup/restore work is not treated complete without required truth updates and evidence."
    blocker_chain_cleared_when:
      - "No missing completion-contract requirement remains for operational-state changes."
    small_patch_is_not_completion: true
  truth_surface_updates_required:
