    Backup/restore/DR baseline with coverage definitions, verification posture,
    and configuration export/import schema.
  developer_intent: >
    After this item, all critical system state and configuration can be backed
    up, exported, imported, and verified to be recoverable.
  allowed_files:
    - "governance/**"
    - "schemas/**"
    - "artifacts/**"
    - "docs/roadmap/**"
  forbidden_files:
    - "framework/**"
    - "tests/**"
    - ".github/**"
  validation_order:
    - "confirm backup coverage schema is defined"
    - "confirm restore verification structure is specified"
    - "confirm DR procedures are documented"
    - "confirm configuration export schema is defined"
    - "confirm configuration import schema is defined"
