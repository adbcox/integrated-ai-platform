schema_version: "1.0"
kind: "roadmap_item"
id: "RM-CORE-004"
slug: "stabilize-artifact-persistence"
title: "Stabilize artifact persistence"
category: "CORE"
type: "platform_foundation"
status: "proposed"
priority: "P1"
scoring:
  loe: 4
  strategic_value: 5
  architecture_fit: 5
  execution_risk: 3
  dependency_burden: 3
  readiness: 3
description: >
  Move run-state persistence behind a single artifact contract and service so all
  execution contexts write artifacts through one normalized interface with consistent
  schema, location, and retention semantics.
why_it_matters: >
  Scattered artifact writes with no contract make validation, rollback, and promotion
  unreliable. A single artifact persistence service enables artifact completeness
  checks, structured retention, and traceable promotion linkage.
scope:
  objective: >
    Define the artifact contract schema, create the artifact persistence service,
    and migrate existing artifact write paths to use it.
  in_scope:
    - "artifact contract schema definition"
    - "artifact persistence service implementation"
    - "migration of existing artifact writes"
    - "artifact completeness check integration"
  out_of_scope:
    - "remote artifact storage"
    - "artifact replication or backup"
    - "Plane sync changes"
dependencies:
  blocked_by:
    - "RM-CORE-003"
  enables:
    - "RM-CORE-006"
  related_items:
    - "RM-CORE-003"
    - "RM-GOV-006"
impact:
  affected_systems:
    - "artifact_contract"
    - "agent_runtime"
    - "validation_pipeline"
    - "control_plane"
  expected_file_families:
    - "framework/**"
    - "bin/**"
    - "artifacts/**"
  impact_summary: >
    Makes artifact writes consistent and traceable across all execution contexts,
    enabling artifact completeness checks and promotion linkage.
