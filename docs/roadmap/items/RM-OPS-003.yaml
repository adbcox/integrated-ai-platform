description: >
  Establish performance profiling to measure execution timing, resource usage,
  and efficiency. Identify bottlenecks and optimize critical paths.
  Enable data-driven optimization decisions.

why_it_matters: >
  Without profiling, optimization is guesswork. Profiling reveals where time
  and resources are spent, enabling targeted optimization. Required for
  scaling Phase 2 beyond proof-of-concept.

scope:
  objective: >
    Wire execution timing into runtime modules. Collect timing and resource metrics.
    Emit profiling data in structured format. Identify slow paths and optimization
    opportunities.
  in_scope:
    - "execution timing (session, command, gateway invocation)"
    - "resource usage tracking (memory, CPU)"
    - "profiling event emission"
    - "bottleneck identification"
  out_of_scope:
    - "continuous performance optimization"
    - "automated tuning"
    - "distributed profiling"

