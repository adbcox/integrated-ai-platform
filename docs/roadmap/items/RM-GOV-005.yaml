schema_version: "1.0"
kind: "roadmap_item"
id: "RM-GOV-005"
slug: "create-cmdb-lite-registry"
title: "Create CMDB-lite registry"
category: "GOV"
type: "platform_foundation"
status: "proposed"
priority: "P1"
scoring:
  loe: 4
  strategic_value: 5
  architecture_fit: 5
  execution_risk: 2
  dependency_burden: 2
  readiness: 3
description: >
  Establish the CMDB-lite registry as the architecture and runtime authority layer,
  separate from the promotion manifest release authority, with machine-readable
  subsystem records.
why_it_matters: >
  Without a CMDB-lite registry, architecture authority is conflated with release
  authority. A separate CMDB-lite provides stable subsystem refs, asset links, and
  service links that roadmap items, ADRs, and execution packages can cite without
  coupling to the promotion manifest.
scope:
  objective: >
    Create the CMDB-lite schema and initial registry with records for the core
    subsystems: roadmap_ops, control_plane, agent_runtime, inference_gateway,
    artifact_contract, validation_pipeline.
  in_scope:
    - "CMDB-lite schema definition"
    - "initial subsystem records"
    - "asset and service link stubs"
    - "architecture authority boundary documentation"
  out_of_scope:
    - "runtime CMDB writeback"
    - "automated CMDB sync"
    - "Plane CMDB integration"
dependencies:
  blocked_by:
    - "RM-GOV-004"
  enables:
    - "RM-GOV-006"
    - "RM-CORE-001"
  related_items:
    - "RM-GOV-001"
impact:
  affected_systems:
    - "cmdb_lite"
    - "roadmap_ops"
    - "control_plane"
    - "agent_runtime"
  expected_file_families:
    - "docs/architecture/cmdb-lite/**"
    - "docs/roadmap/**"
  impact_summary: >
    Provides a stable architecture authority surface that all roadmap items, ADRs,
    and execution packages can reference without coupling to release tooling.
cmdb:
  refs:
    - "subsystem:cmdb_lite"
    - "subsystem:roadmap_ops"
    - "subsystem:control_plane"
  asset_links: []
  service_links: []
grouping:
