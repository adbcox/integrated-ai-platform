description: >
  Build UI surface for failure analysis and debugging.
  Display failure taxonomy, root cause analysis, retry history, and recovery actions.
  Enable users to understand and resolve execution failures.

why_it_matters: >
  When execution fails, users need tools to understand why and take corrective action.
  Failure analyzer UI surfaces failure recovery data and enables troubleshooting.

scope:
  objective: >
    Create web UI for failure inspection. Display failure events with context,
    taxonomy classification, retry history, and suggested recovery actions.
  in_scope:
    - "failure event display"
    - "root cause analysis view"
    - "retry history timeline"
    - "recovery action suggestions"
  out_of_scope:
    - "automated failure resolution"
    - "distributed failure consensus"
    - "predictive failure detection"

