schema_version: "1.0"
kind: "roadmap_item"
id: "RM-CORE-002"
slug: "standardize-model-profiles"
title: "Standardize model profiles"
category: "CORE"
type: "platform_foundation"
status: "proposed"
priority: "P1"
scoring:
  loe: 2
  strategic_value: 4
  architecture_fit: 5
  execution_risk: 1
  dependency_burden: 2
  readiness: 4
description: >
  Define and canonically record the fast, balanced, hard, and long-context local
  coding model profiles so all execution paths select models by profile name rather
  than by direct model identifier.
why_it_matters: >
  Without standardized profiles, model selection is scattered and inconsistent.
  Profiles decouple execution paths from specific model identifiers, making model
  upgrades and routing changes transparent to callers.
scope:
  objective: >
    Define four named profiles (fast, balanced, hard, long-context), record them
    in a canonical config, and update the inference gateway to resolve profile names
    to model identifiers.
  in_scope:
    - "fast profile definition"
    - "balanced profile definition"
    - "hard profile definition"
    - "long-context profile definition"
    - "canonical profile config record"
    - "gateway profile resolution"
  out_of_scope:
    - "dynamic profile selection"
    - "remote model profiles"
    - "Plane sync changes"
dependencies:
  blocked_by:
    - "RM-CORE-001"
  enables:
    - "RM-CORE-005"
  related_items:
    - "RM-CORE-001"
impact:
  affected_systems:
    - "inference_gateway"
    - "agent_runtime"
  expected_file_families:
    - "policies/**"
    - "framework/**"
    - "config/**"
  impact_summary: >
    Decouples execution paths from specific model identifiers. Model upgrades require
    only profile config changes, not execution path changes.
