  execution_risk: 1
  dependency_burden: 1
  readiness: 4

description: >
  Establish Phase 1 runtime foundation for local-first model execution with
  Ollama primary and Claude API fallback, including profile-based routing,
  deterministic workspace management, bounded command execution, and structured
  artifact emission.

why_it_matters: >
  Phase 0 defines governance authority but lacks execution runtime. Phase 1
  runtime foundation enables bounded local execution with fallback capacity,
  profile-aware resource allocation, and reproducible workspace isolation.

scope:
  objective: >
    Define and implement runtime profiles, inference gateway, workspace
    controller, command runner, artifact writer, and validation infrastructure
    for Ollama-first execution posture.
  in_scope:
    - "Runtime profile authority (fast/balanced/hard)"
    - "Inference gateway with deterministic routing"
    - "Workspace controller with deterministic paths"
    - "Bounded command runner with whitelist enforcement"
    - "Artifact writer for runtime result emission"
    - "Runtime schemas (request, response, workspace, artifact)"
    - "Validation script with 25+ checks"
  out_of_scope:
    - "Autonomous execution loop"
    - "Real Ollama model invocation"
    - "Permission engine implementation"
    - "Typed tool system"
    - "Control plane rewrite"

