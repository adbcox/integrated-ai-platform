  architectural_lane: "runtime_execution"
  risk_tier: "low"
  allowed_change_scope: "bounded"
  requires_explicit_escalation: false

ai_operability:
  canonical_summary: >
    Runtime foundation with profile-based routing, deterministic workspace
    isolation, and bounded command execution for Ollama-first posture.
  developer_intent: >
    After this item, all runtime requests are routed through profile-aware
    inference gateway with fallback capacity, workspace isolation is
    deterministic and reproducible, and artifact emission is structured.
  allowed_files:
    - "governance/**"
    - "runtime/**"
    - "schemas/**"
    - "artifacts/**"
    - "docs/roadmap/**"
    - "bin/validate_phase1_runtime_foundation.py"
    - "bin/validate_phase1_runtime_execution_path.py"
    - "bin/validate_phase1_closeout.py"
    - "bin/test_phase1_runtime_integration.py"
  forbidden_files:
    - "framework/**"
    - "tests/**"
    - ".github/**"
  validation_order:
    - "confirm runtime profiles are defined and parse correctly"
    - "confirm inference gateway module imports and routes correctly"
    - "confirm workspace controller initializes and finalizes correctly"
    - "confirm command runner enforces whitelist"
    - "confirm artifact writer emits valid JSON"
    - "confirm all 5 runtime schemas parse correctly"
    - "run validate_phase1_runtime_foundation.py"
    - "verify artifacts/validation/phase1_runtime_foundation_validation.json has PASS status"
    - "verify artifacts/examples/phase1_runtime_run_example.json exists and is valid"
  rollback_rule: >
    Remove runtime/ directory and runtime_profiles.v1.yaml. Preserve governance
    and phase0 authority files.
  artifact_outputs:
    - "governance/runtime_profiles.v1.yaml"
    - "runtime/inference_gateway.py"
    - "runtime/workspace_controller.py"
    - "runtime/artifact_writer.py"
    - "runtime/command_runner.py"
    - "runtime/runtime_executor.py"
    - "runtime/schemas/"
    - "artifacts/validation/phase1_runtime_foundation_validation.json"
    - "artifacts/validation/phase1_runtime_execution_path_validation.json"
    - "artifacts/validation/phase1_closeout_validation.json"
    - "artifacts/validation/phase1_integration_tests.json"
    - "artifacts/examples/phase1_runtime_run_example.json"
    - "artifacts/examples/phase1_execution_control_example.json"
    - "artifacts/examples/phase1_runtime_execution_example.json"
    - "bin/validate_phase1_runtime_foundation.py"
    - "bin/validate_phase1_runtime_execution_path.py"
    - "bin/validate_phase1_closeout.py"
    - "bin/test_phase1_runtime_integration.py"
