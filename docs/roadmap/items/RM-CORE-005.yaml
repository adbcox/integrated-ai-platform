description: >
  Route build, test, lint, and diff invocations through a thin normalized execution
  wrapper so all local commands produce consistent exit codes, structured output,
  and telemetry without execution paths invoking tools directly.
why_it_matters: >
  Direct tool invocations scattered across execution paths produce inconsistent output
  formats, unreliable exit codes, and no telemetry. A thin wrapper normalizes these
  surfaces and enables execution observability without redesigning callers.
scope:
  objective: >
    Create a thin execution wrapper that routes build, test, lint, and diff commands,
    normalizes exit codes and output, and emits basic invocation telemetry.
  in_scope:
    - "execution wrapper for make check / make quick / make test-offline"
    - "normalized exit code contract"
    - "structured output capture"
    - "basic invocation telemetry"
  out_of_scope:
    - "remote execution routing"
    - "container-based execution isolation"
    - "Plane sync changes"
