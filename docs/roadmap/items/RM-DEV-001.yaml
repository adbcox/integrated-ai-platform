description: >
  Establish baseline for Xcode and Apple-platform coding capability in the
  developer assistant, enabling bounded complex coding work for iOS, macOS,
  watchOS, and tvOS targets with structured workflow and execution posture.

why_it_matters: >
  Apple-platform development is out of scope for current local coding system.
  Adding Apple/Xcode capability extends the developer assistant to cover a
  major development ecosystem and expands the target for local-first coding.

scope:
  objective: >
    Define Apple-platform workflow posture, Xcode-oriented execution notes,
    platform-specific constraints, and repo-visible support structures for
    Apple development work.
  in_scope:
    - "Apple platform workflow structure"
    - "Xcode project and build structure"
    - "iOS/macOS/watchOS/tvOS target support"
    - "Objective-C and Swift language support"
    - "CocoaPods and SPM dependency management"
    - "Signing and provisioning workflow"
  out_of_scope:
    - "Xcode IDE implementation"
    - "App Store submission automation"
    - "Real device debugging infrastructure"

