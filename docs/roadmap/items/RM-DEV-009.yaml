description: 'Create persistent, model-operable agent documentation that reduces token
  waste and execution ambiguity for future AI-driven execution systems. Establish
  the agent-docs layer as a reusable reference consumed by execution templates and
  operating rules.

  '
why_it_matters: 'Agent systems waste token budget and suffer coordination failures
  when executing against repos without persistent operating documentation. RM-DEV-009
  establishes the agent-docs layer that execution systems can consume, reducing token
  cost per task and improving execution consistency across bounded codegen runs.

  '
scope:
  objective: 'Create the agent-docs layer with command reference, validation order,
    known failures, and repo map. Make it consumable by execution templates and small
    models.

    '
  in_scope:
  - agent-docs directory structure
  - commands.md (real repo commands only)
  - validation_order.md (exact execution sequence)
  - known_failures.md (failure patterns + corrections)
  - repo_map.md (key directories + purpose)
  out_of_scope:
  - implementation of memory persistence
  - execution engine changes
  - new tools or commands
