governance:
  phase_target: "Execution Control Window"
  architectural_lane: "control_window"
  risk_tier: "medium"
  allowed_change_scope: "bounded"
  requires_explicit_escalation: false

ai_operability:
  canonical_summary: >
    RM-UI-005 control-window implementation and canonicalization item for a local-first
    execution dashboard, deterministic routing, Aider packet orchestration, and OpenHands path.
  developer_intent: >
    Keep execution authority repo-native with truthful machine-usable state and completion logic.
  non_goals:
    - "Do not turn OpenHands into planning authority"
    - "Do not claim full item completion from first-slice implementation alone"
  allowed_files:
    - "framework/**"
    - "bin/**"
    - "tests/**"
    - "docs/roadmap/**"
    - "artifacts/**"
    - "governance/**"
  forbidden_files:
    - ".github/**"
    - "node_modules/**"
    - "venv/**"
  validation_order:
    - "python3 -m pytest -q tests/test_rm_ui005_router_packet.py tests/test_rm_ui005_state_panels.py tests/test_rm_ui005_openhands.py"
    - "python3 bin/compute_next_pull.py"
    - "python3 bin/validate_roadmap_consistency.py"
    - "make check"
    - "make quick"
    - "make test-offline"
  rollback_rule: >
    Revert only RM-UI-005 canonicalization and directly related synchronization updates.
    Preserve unrelated working-tree modifications.
  artifact_outputs:
    - "artifacts/rm_ui005/control_window_state.json"
    - "artifacts/planning/next_pull.json"
    - "artifacts/planning/blocker_registry.json"
    - "governance/roadmap_dependency_graph.v1.yaml"
  promotion_linkage:
    required: false
    manifest_refs: []

execution_contract:
  contract_version: "1.0"
  autonomous_execution_status: "eligible_with_guardrails"
  next_bounded_slice: >
    Maintain and extend the control-window first slice while preserving deterministic
    route contracts, truthful completion ladder semantics, and roadmap truth-surface sync.
  max_autonomous_scope:
    max_files_touched: 14
    max_loc_delta: 900
    allowed_change_kinds:
      - "control_window_surface"
      - "routing_contract"
      - "aider_packet_contract"
      - "openhands_adapter"
      - "roadmap_truth_sync"
  validation_contract:
    required_validations:
      - id: "compute_next_pull"
        command: "python3 bin/compute_next_pull.py"
        pass_when: "exit_code=0"
      - id: "validate_roadmap_consistency"
        command: "python3 bin/validate_roadmap_consistency.py"
        pass_when: "exit_code=0"
      - id: "rm_ui005_tests"
        command: "python3 -m pytest -q tests/test_rm_ui005_router_packet.py tests/test_rm_ui005_state_panels.py tests/test_rm_ui005_openhands.py"
        pass_when: "exit_code=0"
      - id: "make_check"
        command: "make check"
        pass_when: "exit_code=0"
      - id: "make_quick"
        command: "make quick"
        pass_when: "exit_code=0"
      - id: "make_test_offline"
        command: "make test-offline"
        pass_when: "exit_code=0"
    pass_criteria:
      - "Canonical RM-UI-005 item file exists and is included in derived planning surfaces."
      - "Validation and blocker surfaces are regenerated and consistent."
      - "RM-UI-005 first slice remains runnable and test-covered."
  artifact_contract:
    required_artifacts:
      - "artifacts/rm_ui005/control_window_state.json"
      - "artifacts/planning/next_pull.json"
      - "artifacts/planning/blocker_registry.json"
    evidence_outputs:
      - "Control-window state artifact is emitted from implemented RM-UI-005 code path."
      - "Governed planning outputs include RM-UI-005 canonical node state."
    machine_readable_outputs:
      - "artifacts/rm_ui005/control_window_state.json"
      - "artifacts/planning/next_pull.json"
      - "artifacts/planning/blocker_registry.json"
  completion_contract:
    substep_complete_when:
      - "runnable first slice exists with routing, packet, blocker, validation, artifact, and OpenHands panels"
    bounded_slice_complete_when:
      - "validation contract checks pass"
      - "artifact contract outputs exist"
    item_complete_when:
      - "all planned RM-UI-005 slices and DoD evidence are complete"
    blocker_chain_cleared_when:
      - "no directly adjacent RM-UI-005 blocker remains in canonical planning surfaces"
    small_patch_is_not_completion: true
  truth_surface_updates_required:
    - "docs/roadmap/items/RM-UI-005.yaml"
    - "docs/roadmap/ROADMAP_STATUS_SYNC.md"
    - "docs/roadmap/ROADMAP_MASTER.md"
    - "docs/roadmap/ROADMAP_INDEX.md"
    - "docs/roadmap/data/roadmap_registry.yaml"
    - "docs/roadmap/data/sync_state.yaml"
    - "artifacts/planning/next_pull.json"
    - "artifacts/planning/blocker_registry.json"
    - "governance/roadmap_dependency_graph.v1.yaml"
  external_dependency_readiness:
    required: false
    readiness_status: "not_applicable"
    blocks_autonomous_execution: false
    blocking_dependencies: []
    notes: "OpenHands local path is optional execution surface; canonicalization is repo-local."

sync:
  plane:
    sync_enabled: true
    sync_mode: "repo_to_plane_authoritative"
    workspace: "Integrated AI Platform"
    project: "Roadmap Ops"
    plane_item_id: null
