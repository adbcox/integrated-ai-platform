schema_version: "1.0"
kind: "roadmap_item"
id: "RM-UI-005"
slug: "local-execution-control-dashboard-routing-aider-openhands"
title: "Local execution control dashboard, routing layer, Aider orchestration, and OpenHands interface"
category: "UI"
type: "capability_surface"
status: "completed"
archive_status: "ready_for_archive"
priority: "P1"
scoring:
  loe: 4
  strategic_value: 5
  architecture_fit: 5
  execution_risk: 2
  dependency_burden: 2
  readiness: 4

description: >
  Establish a real local execution control window that reduces terminal-only ambiguity by
  surfacing objective/lane/branch state, deterministic route decisions, Aider run-packet
  contracts, blocker and next-target visibility, validation/artifact evidence state,
  completion ladder state, and a subordinate OpenHands local execution path.

why_it_matters: >
  Without a unified control window and deterministic routing/orchestration surface, local
  execution remains ambiguous and difficult to validate. This item hardens local-first
  execution truth, governed target visibility, and bounded completion correctness.

scope:
  objective: >
    Deliver and ratify a usable first local slice of execution control, routing,
    Aider workload packetization, and OpenHands execution interfacing under one
    shared truth and completion model.
  in_scope:
    - "local web control shell"
    - "deterministic task-lane routing"
    - "Aider run-packet generation"
    - "context and token pressure visibility"
    - "validation/artifact/completion ladder panels"
    - "blocker chain and next governed target surfaces"
    - "OpenHands local launch path subordinate to control model"
    - "tests for route/packet/state/launcher"
  out_of_scope:
    - "full visual polish redesign"
    - "broad roadmap backlog normalization"
    - "tactical unlock expansion work"
    - "making OpenHands a second planning authority"

