description: >
  Codify and ratify the definition of done for coding runs, covering artifact completeness,
  validation semantics, rollback semantics, telemetry completeness, and escalation handling.
why_it_matters: >
  Without a locked definition of done, coding run success is ambiguous. Automated
  promotion, AI session closure, and validation pipeline acceptance all require a
  binding contract for what constitutes a complete run.
scope:
  objective: >
    Define, document, and ratify the definition of done contract that covers the
    five required dimensions: artifact completeness, validation, rollback, telemetry,
    and escalation.
  in_scope:
    - "artifact completeness criteria"
    - "validation pass/fail semantics"
    - "rollback rule requirements"
    - "telemetry completeness requirements"
    - "escalation handling requirements"
  out_of_scope:
    - "runtime enforcement tooling"
    - "automated validation scoring"
    - "Plane sync changes"
