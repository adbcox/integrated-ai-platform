description: >
  Establish electrical design baseline supporting ESP32 and Nordic hardware
  workflows. Design-assistant structure for embedded capability. Usable
  hardware-design artifact models.

why_it_matters: >
  Hardware design is specialized. Without structured design workflows and
  artifact models, hardware capability is ad-hoc. Baseline enables repeatable,
  verified hardware designs.

