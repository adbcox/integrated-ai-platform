description: >
  Define and implement the CMDB (Configuration Management Database) that maps
  service/application topology, subsystem dependencies, and capability graph
  as the authoritative foundation for roadmap planning and code intelligence.
why_it_matters: >
  Without a machine-readable topology and capability graph, planning is opaque
  and code intelligence decisions are unmotivated. The CMDB provides the structural
  ground truth that roadmap planners and code intelligence systems depend on.
scope:
  objective: >
    Deliver machine-readable CMDB with service/application topology, subsystem
    definitions, dependency graph, and capability classifications.
  in_scope:
    - "CMDB schema definition"
    - "service and subsystem definitions"
    - "application topology mapping"
    - "dependency graph structure"
    - "capability classifications"
  out_of_scope:
    - "automatic topology discovery"
    - "external system polling"
