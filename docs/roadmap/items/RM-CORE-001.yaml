schema_version: "1.0"
kind: "roadmap_item"
id: "RM-CORE-001"
slug: "introduce-internal-inference-gateway"
title: "Introduce internal inference gateway"
category: "CORE"
type: "platform_foundation"
status: "proposed"
priority: "P1"
scoring:
  loe: 4
  strategic_value: 5
  architecture_fit: 5
  execution_risk: 2
  dependency_burden: 3
  readiness: 3
description: >
  Route all model invocation through one internal inference gateway API instead of
  Ollama-specific shell details, providing a stable abstraction layer for model
  access across all execution contexts.
why_it_matters: >
  Direct Ollama-specific invocation scattered across execution paths makes it impossible
  to swap models, add routing logic, or measure invocation uniformly. A single internal
  gateway enables model profile standardization, routing, and observability without
  changing callers.
scope:
  objective: >
    Introduce an internal inference gateway that accepts a normalized request and
    routes to the appropriate backend (local Ollama, remote API) based on profile.
  in_scope:
    - "inference gateway API definition"
    - "local Ollama backend adapter"
    - "gateway invocation from execution paths"
    - "basic request/response telemetry"
  out_of_scope:
    - "remote API backends beyond basic stub"
    - "model profile auto-selection logic"
    - "Plane sync changes"
dependencies:
  blocked_by:
    - "RM-GOV-003"
    - "RM-GOV-005"
  enables:
    - "RM-CORE-002"
    - "RM-CORE-005"
  related_items:
    - "RM-CORE-003"
impact:
  affected_systems:
    - "inference_gateway"
    - "agent_runtime"
    - "control_plane"
  expected_file_families:
    - "framework/**"
    - "bin/**"
  impact_summary: >
    Provides the single internal model invocation surface that all execution paths
    will use, enabling model profile standardization and invocation observability.
