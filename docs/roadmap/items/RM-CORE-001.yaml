ai_operability:
  canonical_summary: >
    Core runtime item to introduce the internal inference gateway as the single
    normalized model invocation layer over Ollama and other backends.
  developer_intent: >
    After this item, all model calls go through one internal gateway. No execution
    path invokes Ollama directly. Routing, profiling, and telemetry are possible.
  non_goals:
