description: >
  Define and implement the code intelligence decision matrix that selects
  optimal tools (tree-sitter, LSP, ast-grep, regex) based on code structure
  and task requirements, enabling structure-aware modifications at scale.
why_it_matters: >
  Without a decision layer, code modifications are fragile and non-deterministic.
  A unified decision matrix ensures modifications are precise, auditable, and
  appropriate to their target structure.
scope:
  objective: >
    Deliver machine-readable decision matrix and tooling integration that routes
    code modifications to appropriate structure-aware tools based on context.
  in_scope:
    - "code intelligence decision matrix definition"
    - "tool selection criteria"
    - "integration points for tree-sitter, LSP, ast-grep, regex"
    - "example decision paths"
  out_of_scope:
