description: 'Define and ratify the first-pass autonomy scorecard covering success
  rate, retry count, escalation rate, code-outcome coverage, artifact completeness,
  and promotion readiness metrics.

  '
why_it_matters: 'Without a locked autonomy scorecard, there is no measurable definition
  of when the system is ready to advance to higher autonomy tiers. The scorecard makes
  readiness decisions deterministic and auditable.

  '
