description: >
  Approve and record a set of foundational Architecture Decision Records covering
  session schema, tool system, workspace contract, inference gateway, permission model,
  artifact bundle, and autonomy scorecard.
why_it_matters: >
  Without ratified ADRs for these seven domains, every implementation decision in
  Phase 1 and beyond is subject to re-litigation. Ratified ADRs lock the contracts
  that execution and validation will be measured against.
scope:
  objective: >
    Draft, review, and ratify one ADR per foundational domain. Record them in the
    governance ADR authority surface.
  in_scope:
    - "session schema ADR"
    - "tool system ADR"
    - "workspace contract ADR"
    - "inference gateway ADR"
    - "permission model ADR"
    - "artifact bundle ADR"
    - "autonomy scorecard ADR"
  out_of_scope:
    - "runtime implementation of any ADR decisions"
    - "tactical-family unlock reviews"
    - "Plane sync changes"
