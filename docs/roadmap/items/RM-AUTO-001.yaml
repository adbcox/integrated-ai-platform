execution_contract:
  contract_version: '1.0'
  autonomous_execution_status: eligible_with_guardrails
  next_bounded_slice: 'Enforce governed pull gating so autonomous intake cannot select
    items unless execution_contract eligibility, bounded scope, validation, artifact,
    and completion contracts are present.

    '
  max_autonomous_scope:
    max_files_touched: 10
    max_loc_delta: 500
    allowed_change_kinds:
    - selector_policy
    - governance_validation
    - roadmap_item_contract
    - artifact_generation
  validation_contract:
    required_validations:
    - id: compute_next_pull
      command: python3 bin/compute_next_pull.py
      pass_when: exit_code=0
    - id: validate_execution_contracts
      command: python3 bin/validate_roadmap_execution_contracts.py
      pass_when: status=PASS
    pass_criteria:
    - Autonomous pull selector excludes items lacking execution contracts.
    - Contract validator confirms required item coverage.
  artifact_contract:
    required_artifacts:
    - artifacts/planning/next_pull.json
    - artifacts/planning/blocker_registry.json
    - artifacts/validation/roadmap_execution_contract_validation.json
    evidence_outputs:
    - Queue output includes only contract-eligible candidates.
    - Blocker output classifies missing contract and external dependency blockers.
    machine_readable_outputs:
    - artifacts/planning/next_pull.json
    - artifacts/planning/blocker_registry.json
  completion_contract:
    substep_complete_when:
    - Autonomous eligibility fields are explicit in item execution contracts.
    bounded_slice_complete_when:
    - Selector and validator artifacts regenerate successfully.
    item_complete_when:
    - Autonomous pull cannot proceed without full execution contract requirements.
    blocker_chain_cleared_when:
    - No directly adjacent autonomous-eligibility gap remains in required items.
    small_patch_is_not_completion: true
  truth_surface_updates_required:
  - docs/roadmap/items/RM-AUTO-001.yaml
  - docs/roadmap/AUTONOMOUS_EXECUTION_OPERATING_MODE.md
  - docs/roadmap/TARGET_SELECTION_POLICY.md
  - artifacts/planning/next_pull.json
  - artifacts/planning/blocker_registry.json
  external_dependency_readiness:
    required: false
    readiness_status: not_applicable
    blocks_autonomous_execution: false
    blocking_dependencies: []
    notes: Autonomous eligibility governance is fully local.
