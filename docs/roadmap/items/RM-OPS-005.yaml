  allowed_change_scope: bounded
  requires_explicit_escalation: false
ai_operability:
  canonical_summary: 'End-to-end telemetry baseline with event model, trace structure,
    and audit evidence schema linked to execution activity and goals.

    '
  developer_intent: 'After this item, all execution activity generates structured
    telemetry, traces, and audit evidence that can be queried and analyzed for observability
    and compliance.

    '
  allowed_files:
  - governance/**
  - schemas/**
  - artifacts/**
  - docs/roadmap/**
  forbidden_files:
  - framework/**
  - tests/**
  - .github/**
  validation_order:
  - confirm event model schema is defined
  - confirm trace structure is specified
  - confirm audit evidence format is defined
  - confirm linkage to execution is documented
  - confirm linkage to goals is documented
  - make check passes
  rollback_rule: 'Remove telemetry schema and related definitions. Preserve compliance
    documentation.

    '
  artifact_outputs:
  - governance/telemetry_event_schema.v1.yaml
  promotion_linkage:
    required: false
    manifest_refs: []
execution_contract:
  contract_version: '1.0'
  autonomous_execution_status: eligible_with_guardrails
  next_bounded_slice: 'Require telemetry/audit evidence outputs and machine-readable
    validation artifacts as completion gates for any bounded execution slice.

    '
  max_autonomous_scope:
    max_files_touched: 10
    max_loc_delta: 550
    allowed_change_kinds:
    - telemetry_contract
    - validator_logic
    - roadmap_item_contract
    - governance_doc_sync
  validation_contract:
    required_validations:
    - id: compute_next_pull
      command: python3 bin/compute_next_pull.py
      pass_when: exit_code=0
    - id: validate_execution_contracts
      command: python3 bin/validate_roadmap_execution_contracts.py
      pass_when: status=PASS
    - id: validate_roadmap_consistency
      command: python3 bin/validate_roadmap_consistency.py
      pass_when: exit_code=0
    pass_criteria:
    - Validation and blocker artifacts regenerate without schema or sync failures.
    - Required evidence outputs are referenced in contract-bearing items.
  artifact_contract:
    required_artifacts:
    - governance/telemetry_event_schema.v1.yaml
    - artifacts/validation/roadmap_execution_contract_validation.json
    - artifacts/planning/blocker_registry.json
    evidence_outputs:
    - Slice completion requires explicit evidence outputs, not prose-only claims.
    - Telemetry/audit requirements stay machine-readable in item contracts.
    machine_readable_outputs:
    - artifacts/validation/roadmap_execution_contract_validation.json
    - artifacts/planning/blocker_registry.json
  completion_contract:
    substep_complete_when:
    - Evidence and artifact requirements are explicit in execution contract.
    bounded_slice_complete_when:
    - Validation contract checks pass.
    - Artifact contract required outputs are emitted.
    item_complete_when:
    - Telemetry/audit completion is evidence-based and machine-checkable.
    blocker_chain_cleared_when:
    - No missing telemetry evidence contract remains in required governance items.
    small_patch_is_not_completion: true
  truth_surface_updates_required:
  - docs/roadmap/items/RM-OPS-005.yaml
  - artifacts/planning/next_pull.json
  - artifacts/planning/blocker_registry.json
  - governance/roadmap_dependency_graph.v1.yaml
  external_dependency_readiness:
    required: false
    readiness_status: not_applicable
    blocks_autonomous_execution: false
    blocking_dependencies: []
    notes: Telemetry contract hardening is local-governance scope.
