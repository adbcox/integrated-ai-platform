gap_register:
  immediate_questions:
    - "Which exact machine is the canonical local AI host?"
    - "Which exact machine is the canonical primary development host?"
    - "Which exact machine is the canonical Apple/Xcode host?"
    - "What exact GPU(s) and VRAM capacities are available now?"
    - "What motherboard, chipset, and BIOS versions matter for upgrade and stability planning?"
    - "What current firmware, driver, or OS issues could block local AI or coding execution?"
    - "Which systems are suitable for remote operator continuity away from home?"
    - "Which spare systems can be repurposed before new purchases are made?"
  risk_categories:
    - capacity_gap
    - firmware_unknown
    - driver_unknown
    - thermal_or_power_risk
    - storage_insufficient
    - network_remote_access_risk
    - apple_toolchain_gap
    - gpu_vram_gap
    - single_point_of_failure
