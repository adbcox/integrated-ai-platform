metadata:
  purpose: "Machine-readable hardware inventory and capability registry for the governed local-execution platform"
  status: "active_incomplete"
  canonical_companion_doc: "docs/governance/HARDWARE_CAPABILITY_AND_CONSTRAINTS.md"
  update_rules:
    - "Use explicit unknown/to_capture/needs_validation values when facts are not yet confirmed"
    - "Do not silently infer hardware specifications"
    - "Update registry when hardware is added, repurposed, upgraded, retired, or materially reconfigured"
  validation_states:
    - confirmed
    - partial
    - unknown
  asset_statuses:
    - active
    - standby
    - degraded
    - lab_only
    - retired
    - unknown
  role_tags:
    - primary_local_inference_host
    - primary_local_dev_host
    - apple_dev_host
    - automation_orchestrator_host
    - storage_or_dataset_host
    - remote_access_entrypoint
    - dashboard_or_voice_endpoint
    - spare_or_lab_system
  capability_tags:
    - can_run_tier_s_local_models
    - can_run_tier_m_local_models
    - can_run_tier_h_local_models
    - suitable_for_aider_default_host
    - suitable_for_remote_terminal_anchor
    - suitable_for_xcode_primary
    - suitable_for_docker_openhands
    - suitable_for_storage_and_artifacts
    - suitable_for_dashboard_endpoint
    - not_suitable_for_sustained_local_inference
    - not_suitable_for_gpu_accelerated_models

