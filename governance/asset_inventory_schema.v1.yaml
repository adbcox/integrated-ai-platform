schema_version: "1.0"
kind: "governance_schema"
id: "asset_inventory_schema"
name: "Asset Inventory Schema"
description: >
  Schema for asset inventory capture and capability mapping covering
  asset definitions, photo-driven tracking, capability classification, and
  linkage to execution and roadmap work.

namespace: "assets.inventory"

asset_types:
  - type: "hardware_asset"
    description: "Physical hardware devices"
    required_fields:
      - asset_id
      - asset_name
      - category
      - specifications
      - firmware_version
      - capabilities

  - type: "software_asset"
    description: "Software packages and tools"
    required_fields:
      - asset_id
      - asset_name
      - version
      - category
      - dependencies
      - capabilities

  - type: "capability_asset"
    description: "Capability or service provided by system"
    required_fields:
      - capability_id
      - capability_name
      - description
      - dependencies
      - maturity_level
      - readiness_status

  - type: "integration_asset"
    description: "Integration point between components"
    required_fields:
      - integration_id
      - integration_name
      - source_component
      - target_component
      - protocol
      - status

photo_driven_inventory:
  name: "photo_metadata_linkage"
  description: "Link photos to inventory items for visual tracking"

  photo_metadata:
    - field: "photo_id"
      type: "string"
      description: "Unique identifier for photo"

    - field: "asset_id"
      type: "string"
      description: "Asset this photo documents"

    - field: "capture_date"
      type: "ISO 8601"
      description: "When photo was taken"

    - field: "location"
      type: "string"
      description: "Where photo was taken"

    - field: "caption"
      type: "string"
      description: "Human-readable caption"

    - field: "tags"
      type: "array of strings"
      description: "Tags for searching"

    - field: "file_path"
      type: "string"
      description: "Path to photo file"

    - field: "content_hash"
      type: "string"
      description: "SHA256 hash of photo content"

capability_classification:
  name: "capability_mapping"
  classification_dimensions:
    - dimension: "maturity_level"
      levels:
        - level: "concept"
          description: "Theoretical or planned"

        - level: "prototype"
          description: "Working prototype exists"

        - level: "alpha"
          description: "Alpha release, limited functionality"

        - level: "beta"
          description: "Beta release, most functionality working"

        - level: "released"
          description: "Production release"

        - level: "deprecated"
          description: "No longer supported"

    - dimension: "readiness_status"
      statuses:
        - status: "not_started"
          description: "Work not yet started"

        - status: "in_progress"
          description: "Work in progress"

        - status: "blocked"
          description: "Work blocked on dependency"

        - status: "ready_for_test"
          description: "Ready for testing"

        - status: "in_test"
          description: "Being tested"

        - status: "test_passed"
          description: "Testing complete and passed"

        - status: "ready_for_production"
          description: "Ready to deploy to production"

    - dimension: "risk_level"
      levels:
        - level: "low"
          description: "Low risk, well-understood, proven"

        - level: "medium"
          description: "Some risk, reasonable mitigation"

        - level: "high"
          description: "High risk, significant unknowns"

inventory_linkage:
  name: "asset_roadmap_execution_linkage"
  linkage_types:
    - linkage: "asset_to_roadmap"
      description: "Link asset to roadmap item"
      fields:
        - asset_id
        - roadmap_item_id
        - relationship_type

    - linkage: "asset_to_execution"
      description: "Link asset to execution result"
      fields:
        - asset_id
        - execution_session_id
        - artifact_path
        - validation_result

    - linkage: "capability_to_roadmap"
      description: "Link capability to roadmap goal"
      fields:
        - capability_id
        - roadmap_item_id
        - enables_work
        - required_by_item

capability_dependency_model:
  name: "capability_dependencies"
  dependency_types:
    - type: "requires"
      description: "Capability requires another capability"

    - type: "enables"
      description: "Capability enables another capability"

    - type: "conflicts_with"
      description: "Capability conflicts with another"

    - type: "replaces"
      description: "Capability replaces another"

inventory_reconciliation:
  name: "inventory_audit"
  audit_checks:
    - check: "asset_existence"
      description: "Verify all assets in inventory still exist"

    - check: "photo_completeness"
      description: "Verify all assets have photo documentation"

    - check: "capability_accuracy"
      description: "Verify capability classifications are current"

    - check: "linkage_validity"
      description: "Verify all asset/roadmap links are current"

    - check: "status_currency"
      description: "Verify asset status fields reflect current state"

  reconciliation_frequency:
    - frequency: "weekly"
      description: "Weekly asset inventory audit"

    - frequency: "monthly"
      description: "Full capability audit and reconciliation"

    - frequency: "quarterly"
      description: "Strategic review and classification update"
