      - "P0-03-EXECUTION-CONTROL-PACKAGE-1"
      - "P0-04-CMDB-LITE-REGISTRY-1"
      - "P0-05-DEFINITION-OF-DONE-1"
      - "P0-06-AUTONOMY-SCORECARD-1"
      - "P1-01-MODEL-PROFILES-1"
      - "P1-02-INFERENCE-GATEWAY-CONTRACT-1"
      - "P1-03-WORKSPACE-CONTRACT-1"
      - "P1-05-WRAPPED-COMMAND-CONTRACT-1"
