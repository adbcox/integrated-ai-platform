# ─────────────────────────────────────────────
# PHASE IDENTITY
# ─────────────────────────────────────────────
phase_id: "phase_1"
phase_label: "Phase 1 — Runtime Contract Foundation"
phase_status: "substrate_authority_locked"
description: >
  Phase 1 establishes the machine-readable authority surface for all coding run
  execution contracts. Its objective is a locked, reproducible substrate from which
  Phase 2 (local runtime implementation) can build without needing to redesign or
  re-govern the foundational contracts.

# ─────────────────────────────────────────────
# OBJECTIVE
# What Phase 1 must accomplish
# ─────────────────────────────────────────────
objective:
  primary: >
    Create and ratify the complete set of governance contracts governing how coding
    runs execute, what they may write, how results are normalized, and how validation
    is sequenced. These contracts are the authority surface for Phase 2 runtime
    implementation.

  scope_boundary: >
    Phase 1 is governance and substrate contract work only. Runtime implementation
    (a live wrapped command runner, inference adapter integration, telemetry pipeline)
    is Phase 2 work. Phase 1 ends when the contracts are in place and validated —
    not when the runtime implements them.

  success_criterion: >
    Phase 1 is complete when all required_contracts exist as machine-readable YAML,
    have passing seam tests, have emitted governance artifacts, and are cross-referenced
    in this baseline document.

# ─────────────────────────────────────────────
# REQUIRED CONTRACTS
# All governance contracts that must exist for Phase 1 closure
# ─────────────────────────────────────────────
