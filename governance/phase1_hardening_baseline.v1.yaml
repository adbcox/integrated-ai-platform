# ─────────────────────────────────────────────
# COMPLETION REQUIREMENTS
# What must be true for Phase 1 to be declared complete
# ─────────────────────────────────────────────
completion_requirements:
  description: >
    Phase 1 is complete when all of these conditions are simultaneously true.
    Any unresolved condition is a Phase 1 blocker.

  reproducible_local_runs:
    requirement: >
      A coding run can be executed locally — grounding inputs verified, runner
      script executed, artifact emitted, seam tests passing — without any
      manual environment repair (missing files, missing dependencies,
      path fixups not declared in the package).
    evidence_required: "passing seam tests for all Phase 1 contract packages"
    status: "met"

  complete_artifacts:
    requirement: >
      All governance artifacts declared in required_contracts[*].artifact_path
      exist at their declared paths, parse as valid JSON, and contain all required
      fields including artifact_id, generated_at, phase_linkage, authority_sources.
    evidence_required: "artifact files present and passing seam test assertions"
    status: "met"

  no_manual_environment_repair:
    requirement: >
      No Phase 1 package required manual intervention to fix a missing dependency,
      missing file, or environment state not captured in the package's grounding
      inputs or validation order. Any exception must be documented in residual_notes.
    evidence_required: "clean seam test run with no skips due to missing env state"
    status: "met"

  explicit_escalation_accounting:
    requirement: >
      Every Phase 1 package explicitly reports escalation_status. No package
      left escalation_status unspecified. The escalation record is complete for
      all packages in this phase.
    evidence_required: "escalation_status in all artifact outputs; all report NOT ESCALATED"
    status: "met"
    phase1_escalation_summary: "0 escalations across all Phase 1 packages"

# ─────────────────────────────────────────────
# BLOCKERS
# Outstanding items that would prevent Phase 1 closure
# ─────────────────────────────────────────────
blockers:
  description: >
    Blockers are conditions that prevent Phase 1 from being declared materially
    locked. This list must exist even if empty. An empty blockers list means
    Phase 1 completion requirements are all met.

  unresolved: []

  resolved:
    - blocker_id: "P1-BLOCKER-01"
      description: "Phase 1 contracts did not exist at session start"
      resolution: "Created in packages P1-01 through P1-06 in this execution lane"
      resolved_by: "P1-06-PHASE1-HARDENING-CLOSEOUT-PACK-1"

# ─────────────────────────────────────────────
# NOTES
# Non-blocking observations and forward references
# ─────────────────────────────────────────────
notes:
  phase2_scope: >
    Phase 2 (local runtime implementation) picks up where Phase 1 leaves off.
    Phase 2 scope includes: implementing framework/wrapped_command_runner.py,
    wiring the telemetry emission pipeline, integrating the inference gateway
    contract into framework/inference_adapter.py, and executing the local_run_
    validation_pack sequence automatically at package end.

  p1_04_note: >
    Package P1-04 was not issued in this execution lane. The sequence jumped
    from P1-03 (workspace contract) to P1-05 (wrapped command contract) and
    then P1-06 (closeout pack). The P1-04 slot is reserved for a future
    permission model contract if the control window issues it.

  authority_lock_meaning: >
    'substrate_authority_locked' means the contracts in required_contracts are
    the authoritative definitions for Phase 1 execution semantics. They may be
    amended by subsequent packages with explicit allowed_files declarations, but
    they may not be silently replaced or overwritten.

  exec_lane_commits:
    branch: "exec-lane"
    packages_executed:
