# ─────────────────────────────────────────────
# SUBSYSTEMS
# ─────────────────────────────────────────────
subsystems:
  control_plane:
    description: "Governance authority surfaces, ADR chain, phase gate enforcement"
    status: "active"
    primary_paths:
      - "governance/"
      - "docs/adr/"
      - "docs/specs/"
    key_files:
      - "governance/canonical_roadmap.json"
      - "governance/phase_gate_status.json"
      - "governance/current_phase.json"
      - "governance/next_package_class.json"
      - "governance/schema_contract_registry.json"
    adr_refs:
      - "ADR-0001"
      - "ADR-0003"
      - "ADR-0006"
    phase_introduced: 0
    notes: "Machine-readable authority under governance/ supersedes all narrative docs per ADR-0001 / AS-CW-01"

  inference_fabric:
    description: "Inference backend routing: local Ollama and remote API (SUBSTRATE/LOCAL-FIRST)"
    status: "active"
    primary_paths:
      - "framework/inference_adapter.py"
      - "bin/stage_rag*.py"
    key_files:
      - "framework/inference_adapter.py"
      - "policies/"
    adr_refs:
      - "ADR-0004"
    phase_introduced: 1
    notes: "All inference calls route through framework/inference_adapter.py per ADR-0004"

  agent_runtime:
    description: "Job scheduling, worker pool, session execution, executor abstraction"
    status: "active"
    primary_paths:
      - "framework/worker_runtime.py"
      - "framework/scheduler.py"
      - "framework/code_executor.py"
      - "bin/stage*_manager.py"
    key_files:
      - "framework/worker_runtime.py"
      - "framework/scheduler.py"
      - "framework/job_schema.py"
      - "framework/code_executor.py"
    adr_refs:
      - "ADR-0001"
      - "ADR-0002"
    phase_introduced: 1
    notes: "Primary executor is ClaudeCodeExecutor; AiderExecutor is fallback per CLAUDE.md"

  retrieval_memory:
    description: "Stage RAG pipeline: BM25 retrieval, entity-aware reranking, context aggregation"
    status: "active"
    primary_paths:
      - "bin/stage_rag1_*.py"
      - "bin/stage_rag2_*.py"
      - "bin/stage_rag3_*.py"
      - "bin/stage_rag4_plan_probe.py"
      - "bin/stage_rag6_plan_probe.py"
      - "framework/codebase_repomap.py"
    key_files:
      - "bin/stage_rag4_plan_probe.py"
      - "framework/codebase_repomap.py"
    adr_refs: []
    phase_introduced: 3
    notes: "Entity-aware reranking (stage_rag4) improved retrieval by 28.5pp over BM25 baseline"

  evaluation_governance:
    description: "Benchmarking, validation, autonomy scoring, learning hooks"
    status: "active"
    primary_paths:
      - "tests/"
      - "artifacts/"
      - "framework/learning_hooks.py"
      - "framework/state_store.py"
    key_files:
      - "artifacts/baseline_validation/latest.json"
      - "framework/learning_hooks.py"
      - "framework/state_store.py"
    adr_refs:
      - "ADR-0006"
      - "ADR-0007"
    phase_introduced: 2
    notes: "Autonomy scorecard (ADR-0007) governs regression detection across phase transitions"

# ─────────────────────────────────────────────
# MIGRATION MAP
# Records disposition of legacy/frozen surfaces
# ─────────────────────────────────────────────
migration_map:
  - surface: "config/promotion_manifest.json"
    disposition: "frozen_pending_migration"
    authority: "governance/authority_adr_0001_source_of_truth.md"
    notes: "Frozen; tactical release authority only; migration requires explicit ADR"

  - surface: "docs/* narrative roadmaps"
    disposition: "advisory_only"
    authority: "governance/authority_adr_0001_source_of_truth.md"
    notes: "All docs/ narrative superseded by governance/ machine-readable artifacts"

  - surface: "governance/current_phase.json (current_phase_id=0)"
    disposition: "stale_pending_closure"
    authority: "P0-01-AUTHORITY-SURFACE-INVENTORY-1 CONF-01"
    notes: "Reports phase 0 open despite phases 2–7 being closed_ratified; requires Phase 0 closure package"

  - surface: "governance/phase_gate_status.json Phase 0 gate"
    disposition: "open_pending_ratification"
    authority: "P0-01-AUTHORITY-SURFACE-INVENTORY-1 CONF-02"
    notes: "Phase 0 gate remains open; must transition to closed_ratified via formal closure decision"

  - surface: "framework/tool_schema (unanchored)"
    disposition: "anchored_by_adr"
    authority: "ADR-0002-typed-tool-system"
    notes: "framework.tool_schema in schema_contract_registry now has ADR-0002 as governance anchor"

  - surface: "docs/authority_inputs/revised_target_architecture_handoff_v4.docx"
    disposition: "superseded_by_v7"
    authority: "AS-V4-01 status field"
    notes: "V4 handoff declared superseded; V7 is the active handoff surface"

  - surface: "governance/inner_loop_contract.json"
    disposition: "active_referenced"
    authority: "governance/authority_adr_0018_phase1_local_runtime_closure.md"
    notes: "Active inner-loop contract; referenced by Phase 1/2 closure evidence"

# ─────────────────────────────────────────────
# MODEL PROFILES
# LOCAL-FIRST routing profiles per CLAUDE.md
# ─────────────────────────────────────────────
model_profiles:
  fast:
    model_id: "qwen2.5-coder:14b"
    backend: "local_ollama"
    make_target: "aider-fast"
    use_case: "default local iteration; guard clause, assertion, replacement tasks"
    max_file_scope: 5
    adr_ref: "ADR-0004"

  balanced:
    model_id: "qwen2.5-coder:14b"
    backend: "local_ollama"
    make_target: "aider-fast"
    use_case: "bounded multi-file modifications with validation"
    max_file_scope: 5
    notes: "Alias for fast profile at current model tier; distinct profile reserved for mid-size model"
    adr_ref: "ADR-0004"

  hard:
    model_id: "deepseek-coder-v2"
    backend: "local_ollama"
    make_target: "aider-hard"
    use_case: "complex refactors, architectural changes, hard semantic generation"
    max_file_scope: 5
    adr_ref: "ADR-0004"

  large:
    model_id: "32b-model"
    backend: "local_ollama"
    make_target: "aider-smart"
    env_var: "OLLAMA_API_BASE_32B"
    use_case: "large context tasks requiring 32B parameter model"
    max_file_scope: 5
    adr_ref: "ADR-0004"

  substrate:
    model_id: "claude-sonnet-4-6"
    backend: "remote_api"
    routing_label: "SUBSTRATE"
    use_case: "governance, schema, ADR, contract, and architecture work"
    adr_ref: "ADR-0004"

