# ─────────────────────────────────────────────
# ARTIFACT POLICY
# ─────────────────────────────────────────────
artifact_policy:
  artifact_root: "artifacts/"
  governance_root: "artifacts/governance/"
  retention_policy: "retain_all"
  gitignore_note: "artifacts/ is in .gitignore; governance artifacts are force-added per package commit discipline"
  canonical_paths:
    governance: "artifacts/governance/"
    baseline_validation: "artifacts/baseline_validation/"
    expansion: "artifacts/expansion/"
    escalations: "artifacts/escalations/"
    stage_rag: "artifacts/stage_rag4/"
  bundle_policy:
    governance_session: "retain_on_failure"
    capability_session: "retain_on_failure"
    measurement_session: "retain"
    planning_session: "retain"
  adr_ref: "ADR-0006"

