adapter_status:
  aider:
    status: "active"
    routing_label: "LOCAL-FIRST"
    integration: "Makefile targets (aider-fast, aider-hard, aider-smart, aider-micro-safe)"
    notes: "Primary local executor for LOCAL-FIRST packages; must be installed for non-SUBSTRATE sessions"

  claude:
    status: "active"
    routing_label: "SUBSTRATE"
    integration: "Claude Code CLI / framework/inference_adapter.py remote_api backend"
    model_id: "claude-sonnet-4-6"
