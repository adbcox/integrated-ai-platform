graph_schema:
  description: "Machine-readable roadmap item dependency graph with blocked/unblocked state"
  node_type:
    - id: "roadmap item ID (RM-*)"
    - title: "human-readable title"
    - status: "completed | in_validation | proposed | planned"
    - category: "GOV | CORE | DEV | INTEL | AUTO"
    - priority: "P1 | P2 | P3"
    - phase_target: "Phase 0-6"

  edge_type:
    - source: "blocking item"
    - target: "blocked item"
    - type: "hard (must complete before) | soft (recommend before)"
    - resolved: "true (source complete) | false (source not complete)"

  state_computation:
    blocked_vs_unblocked: >
      Item is BLOCKED if ANY hard dependency is not completed.
      Item is UNBLOCKED if ALL hard dependencies are completed OR item has no hard dependencies.
    priority_scoring: >
      base_score = priority_value (P1=3, P2=2, P3=1)
      readiness = phase_target proximity to current phase
      depth = how many unblocked items depend on this item
      pull_priority_score = base_score + (0.5 * depth) + (0.25 * readiness)

