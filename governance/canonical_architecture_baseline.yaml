trust_boundaries:
  - id: "TB-INTERNAL"
    name: "Internal Trusted Boundary"
    description: "Subsystems within this boundary may freely call each other without escalation"
    subsystems:
      - "SYS-CTRL-001"
      - "SYS-RUNTIME-001"
      - "SYS-RAG-001"
      - "SYS-REPOMAP-001"
      - "SYS-EVAL-001"
      - "SYS-ARTIFACT-001"
      - "SYS-GOVERNANCE-001"
      - "SYS-ROADMAP-001"
      - "SYS-POLICY-001"
      - "SYS-LEARNING-001"
      - "SYS-PERMISSION-001"
      - "SYS-STATE-001"
      - "SYS-SCHEDULER-001"
      - "SYS-REPORTING-001"

  - id: "TB-EXTERNAL"
    name: "External/Third-Party Boundary"
    description: "Subsystems in this boundary depend on external services or APIs"
    subsystems:
      - "SYS-INF-001"
      - "SYS-DEVASSIST-001"
      - "SYS-AIDER-ADAPTER-001"

trust_matrix:
  description: "Cross-boundary call permissions (source -> target allowed)"
  rules:
    - source: "TB-INTERNAL"
      targets:
        - "TB-INTERNAL"
        - "TB-EXTERNAL"
      reason: "Internal subsystems may call external adapters and gateways"

    - source: "TB-EXTERNAL"
      targets:
        - "TB-INTERNAL"
        - "TB-EXTERNAL"
      reason: "External subsystems (inference, user I/O) may call back to internal; inference calls to inference allowed"

