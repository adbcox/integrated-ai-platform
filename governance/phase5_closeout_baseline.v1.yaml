---
# Phase 5 Closeout Baseline v1
# Authority surface: P5-01-QUALIFICATION-AND-READINESS-CLOSEOUT-PACK-1
# Governed by: governance/phase5_readiness_baseline.v1.yaml,
#   governance/phase4_uplift_baseline.v1.yaml,
#   governance/local_run_validation_pack.v1.yaml,
#   governance/definition_of_done.v1.yaml
# Scope: Phase 5 closeout qualification, local autonomy gate, and promotion readiness

version: "1.0.0"
baseline_id: "PHASE5-CLOSEOUT-BASELINE-V1"
generated_at: "2026-04-21"
authority_owner: "governance/authority_adr_0001_source_of_truth.md"
phase_linkage: "Phase 5 (live_local_model_integration)"

# ─────────────────────────────────────────────
# PHASE IDENTITY
# ─────────────────────────────────────────────
phase_id: "phase_5"
phase_label: "Phase 5 — Live Local Model Integration"
phase_status: "qualification_in_progress"
description: >
  Phase 5 closeout requires qualification readiness, local autonomy gate passage,
  and regression summary evidence. This baseline defines the minimum surfaces
  and evidence required to evaluate promotion readiness from Phase 5 toward Phase 6.

# ─────────────────────────────────────────────
# REQUIRED MODULES
# ─────────────────────────────────────────────
required_modules:
  unified_validation_artifact_v1:
    module: "framework/unified_validation_artifact_v1.py"
    classes:
      - UnifiedValidationArtifactV1
    status: "present"

  qualification_readiness_v1:
    module: "framework/qualification_readiness_v1.py"
    classes:
      - QualificationReadinessEvaluatorV1
      - QualificationReadinessResultV1
    status: "present"

  local_autonomy_gate_v1:
    module: "framework/local_autonomy_gate_v1.py"
    classes:
      - LocalAutonomyGateEvaluatorV1
      - LocalAutonomyGateResultV1
    status: "present"

  regression_summary_v1:
    module: "framework/regression_summary_v1.py"
    classes:
      - RegressionSummaryV1
      - RegressionCaseV1
    status: "present"

  phase5_closeout_v1:
    module: "framework/phase5_closeout_v1.py"
    classes:
      - Phase5CloseoutV1
      - Phase5CloseoutRecordV1
    status: "present"

# ─────────────────────────────────────────────
# REQUIRED CAPABILITIES
# ─────────────────────────────────────────────
required_capabilities:
  unified_validation_artifact:
    module: "unified_validation_artifact_v1"
    description: >
      Bundle package_id, validations_run, validation_results, artifacts_produced,
      escalation_status, and final_outcome into a single serializable record.

  qualification_readiness:
    module: "qualification_readiness_v1"
    description: >
      Evaluate artifact_completeness, validation_pass_rate, and escalation_accounting.
      Return readiness_ready and blocking_gaps.

  local_autonomy_gate:
    module: "local_autonomy_gate_v1"
    description: >
      Evaluate first_pass_success_signal, retry_discipline_signal,
      escalation_rate_signal, and artifact_completeness_signal.
      Return gate_passed, gate_reasons, and gate_blockers.

  regression_summary:
    module: "regression_summary_v1"
    description: >
      Summarize regression_cases_run, regression_cases_passed, pass_rate,
      and failure_modes from a list of RegressionCaseV1 records.

  phase5_closeout_record:
    module: "phase5_closeout_v1"
    description: >
      Assemble unified validation artifact, qualification readiness result,
      local autonomy gate result, and regression summary into a structured
      Phase5CloseoutRecordV1 with promotion_readiness_ready boolean.

# ─────────────────────────────────────────────
# COMPLETION REQUIREMENTS
# ─────────────────────────────────────────────
completion_requirements:
  qualification_cases_execute:
    description: "qualification_cases_run >= 3 in the closeout artifact"
    status: "met_by_p5_01"

  regression_summary_emitted:
    description: "regression_summary present and regression_cases_run >= 3"
    status: "met_by_p5_01"

  promotion_readiness_evaluated:
    description: "promotion_readiness_ready present as boolean in the closeout artifact"
    status: "met_by_p5_01"

  explicit_escalation_accounting:
    description: "escalation_status present in all closeout outputs"
    status: "met_by_p5_01"

# Minimum gate values
completion_gate:
  minimum_qualification_pass_rate: 0.75
  minimum_regression_cases: 3
  escalation_status_required: true
  phase5_closeout_gate_status: "met_by_p5_01"

# ─────────────────────────────────────────────
# REMAINING BLOCKERS
# ─────────────────────────────────────────────
remaining_blockers:
  - id: "P5-BLOCKER-01"
    description: >
      LocalAutonomyGateEvaluatorV1 evaluates signals only; not wired to
      live Ollama/Aider execution telemetry. Real execution signals deferred
      to Phase 6 live integration.
    deferred_to: "phase_6"

  - id: "P5-BLOCKER-02"
    description: >
      RegressionSummaryV1 summarizes synthetic cases only; not wired to
      real file modification outcomes. Real regression outcomes deferred
      to Phase 6.
    deferred_to: "phase_6"

  - id: "P5-BLOCKER-03"
    description: >
      Phase5CloseoutV1 does not persist closeout records to a durable store;
      in-session only. Durable persistence deferred to Phase 6.
    deferred_to: "phase_6"

# ─────────────────────────────────────────────
# PROMOTION READINESS GATE
# ─────────────────────────────────────────────
promotion_readiness_gate:
  description: >
    Phase 5 promotion to Phase 6 is authorized when:
      1. qualification_result.readiness_ready = true
      2. autonomy_gate_result.gate_passed = true
      3. unified_artifact.all_passed = true
      4. regression_cases_run >= 3
      5. escalation_status = NOT_ESCALATED in all outputs
      6. make check passes
      7. Seam tests for Phase 5 pass

  gate_status: "pending"
  gate_cleared_by: null
  note: >
    This gate is evaluated by running Phase5CloseoutV1 against the evidence
    produced by the Phase 5 closeout runner. Gate is NOT cleared at P5-01
    package creation time; it requires promotion evidence to be scored.
