version: "3.9"

services:
  vault-agent-homepage:
    image: hashicorp/vault:2.0.0
    container_name: vault-agent-homepage
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      SKIP_SETCAP: "true"
    volumes:
      - /Users/admin/.vault-approle/homepage:/vault/approle:ro
      - /Users/admin/.vault-agent-secrets/homepage:/vault/secrets
      - ./vault-agent/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault-agent/credentials.env.tmpl:/vault/agent-config/credentials.env.tmpl:ro
    command: agent -config=/vault/config/agent.hcl
    networks:
      - control-center-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  homepage:
    image: ghcr.io/gethomepage/homepage:v1.12.3
    container_name: homepage
    restart: unless-stopped
    depends_on:
      vault-agent-homepage:
        condition: service_completed_successfully
    ports:
      - "3005:3000"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "homepage.internal,localhost:3005,127.0.0.1:3005"
    volumes:
      - ./config:/app/config
      - /Users/admin/.vault-agent-secrets/homepage:/vault/secrets:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: ["sh", "-c", "set -a && . /vault/secrets/credentials.env && set +a && exec /usr/local/bin/docker-entrypoint.sh node server.js"]
    networks:
      - control-center-net
    extra_hosts:
      - "mac-mini.internal:host-gateway"
      - "qnap.internal:192.168.10.201"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      com.iap.service: "homepage"
      com.iap.tier: "control-center"

networks:
  control-center-net:
    name: control-center-net
    external: true
