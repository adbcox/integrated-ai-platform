version: "3.9"

services:
  vault-agent-vaultwarden:
    image: hashicorp/vault:2.0.0
    container_name: vault-agent-vaultwarden
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      SKIP_SETCAP: "true"
    volumes:
      - /Users/admin/.vault-approle/vaultwarden:/vault/approle:ro
      - /Users/admin/.vault-agent-secrets/vaultwarden:/vault/secrets
      - ./vault-agent/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault-agent/credentials.env.tmpl:/vault/agent-config/credentials.env.tmpl:ro
    command: agent -config=/vault/config/agent.hcl
    networks:
      - control-center-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    depends_on:
      vault-agent-vaultwarden:
        condition: service_completed_successfully
    ports:
      - "8083:80"
    environment:
      DOMAIN: "https://vaultwarden.internal"
      SIGNUPS_ALLOWED: "true"
      LOG_LEVEL: "warn"
    volumes:
      - vaultwarden-data:/data
      - /Users/admin/.vault-agent-secrets/vaultwarden:/vault/secrets:ro
    entrypoint: ["sh", "-c", "set -a && . /vault/secrets/credentials.env && set +a && exec /start.sh"]
    networks:
      - vaultwarden-net
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      com.iap.service: "vaultwarden"
      com.iap.tier: "platform"

volumes:
  vaultwarden-data:
    name: vaultwarden-data

networks:
  vaultwarden-net:
    name: vaultwarden-net
    driver: bridge
  control-center-net:
    name: control-center-net
    external: true
