version: '3.8'

# ── Plane CE (Community Edition) — 100% Open Source ──────────────────────────
# ALL components are open source software. Zero cloud dependencies.
#   plane-frontend   makeplane/plane-frontend   OSS (AGPL-3.0)
#   plane-backend    makeplane/plane-backend    OSS (AGPL-3.0)
#   PostgreSQL       postgres:15-alpine         OSS (PostgreSQL License)
#   Redis            redis:7.2-alpine           OSS (BSD 3-Clause)
#   MinIO            minio/minio                OSS (AGPL-3.0) — replaces any cloud S3
#
# Web UI:   http://localhost:3001
# API:      http://localhost:8000
# MinIO UI: http://localhost:9001  (user: plane / password from docker/.env)
#
# First-run:
#   1.  cd /Users/admin/repos/integrated-ai-platform
#   2.  docker compose -f docker/docker-compose-plane.yml up -d
#   3.  docker logs -f docker-plane-migrate-1   (wait for "Done")
#   4.  Open http://localhost:3001 → create account, workspace slug: iap
#   5.  Create project "Roadmap" → copy UUID from URL
#   6.  Profile → API Tokens → new token → copy value
#   7.  Edit docker/.env:  PLANE_API_TOKEN=...  PLANE_PROJECT_ID=...
#   8.  python3 bin/configure_plane_agile.py   (set up states, labels, cycles)
#   9.  python3 bin/sync_roadmap_to_plane.py   (load all 600 items)

x-backend-env: &backend-env
  # ── Database & cache ────────────────────────────────────────────────────────
  DATABASE_URL:                  postgresql://plane:plane@plane-db/plane
  REDIS_URL:                     redis://plane-redis:6379/
  CELERY_BROKER_URL:             redis://plane-redis:6379/
  DJANGO_CHANNEL_LAYER_BACKEND_URL: redis://plane-redis:6379/

  # ── Security ────────────────────────────────────────────────────────────────
  SECRET_KEY:                    ${PLANE_SECRET_KEY:-please-set-PLANE_SECRET_KEY-in-dot-env}
  DEBUG:                         "0"
  DJANGO_SETTINGS_MODULE:        plane.settings.production

  # ── App URLs (must match what the browser uses) ──────────────────────────
  WEB_URL:                       http://localhost:3001
  CORS_ALLOWED_ORIGINS:          http://localhost:3001,http://localhost:8000

  # ── Initial admin account ────────────────────────────────────────────────
  ENABLE_SIGNUP:                 "True"
  DEFAULT_EMAIL:                 ${PLANE_ADMIN_EMAIL:-admin@local.dev}
  DEFAULT_PASSWORD:              ${PLANE_ADMIN_PASSWORD:-Admin1234!}

  # ── MinIO (open-source S3-compatible object storage — NO AWS) ────────────
  USE_MINIO:                     "1"
  MINIO_END_POINT:               plane-minio:9000
  AWS_ACCESS_KEY_ID:             ${MINIO_ROOT_USER:-plane}
  AWS_SECRET_ACCESS_KEY:         ${MINIO_ROOT_PASSWORD:-plane-minio-secret}
  AWS_S3_BUCKET_NAME:            uploads
  AWS_S3_ENDPOINT_URL:           http://plane-minio:9000
  AWS_DEFAULT_ACL:               public-read
  FILE_SIZE_LIMIT:               "5242880"

services:
  # ── Step 1: run DB migrations once, then exit ─────────────────────────────
  plane-migrate:
    image: makeplane/plane-backend:stable
    command: ./bin/docker-entrypoint-migrator.sh
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
    environment:
      <<: *backend-env
    networks:
      - plane-net

  # ── Step 2: create MinIO "uploads" bucket ────────────────────────────────
  plane-minio-setup:
    image: minio/mc:latest
    depends_on:
      - plane-minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://plane-minio:9000 plane ${MINIO_ROOT_PASSWORD:-plane-minio-secret}; do
        echo 'MinIO not ready, retrying...'; sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing myminio/uploads;
      /usr/bin/mc anonymous set download myminio/uploads;
      echo 'MinIO bucket ready.';
      "
    networks:
      - plane-net

  # ── API server ────────────────────────────────────────────────────────────
  plane-api:
    image: makeplane/plane-backend:stable
    restart: unless-stopped
    command: ./bin/docker-entrypoint-api.sh
    depends_on:
      plane-migrate:
        condition: service_completed_successfully
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-minio:
        condition: service_started
    environment:
      <<: *backend-env
      GUNICORN_WORKERS: "2"
      GUNICORN_TIMEOUT: "120"
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/');sys.exit(0)\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 20s
    volumes:
      - plane-logs:/code/plane/logs
    networks:
      - plane-net

  # ── Frontend (nginx-based, pre-built static files) ───────────────────────
  plane-web:
    image: makeplane/plane-frontend:stable
    restart: unless-stopped
    # No command override — uses the nginx entrypoint from the image
    depends_on:
      plane-api:
        condition: service_healthy
    environment:
      # These are substituted by the nginx entrypoint into the static app config
      NEXT_PUBLIC_API_BASE_URL:  http://localhost:8000
      NEXT_PUBLIC_DEPLOY_URL:    http://localhost:3001
    ports:
      - "3001:3000"
    networks:
      - plane-net

  # ── Celery async worker ───────────────────────────────────────────────────
  plane-worker:
    image: makeplane/plane-backend:stable
    restart: unless-stopped
    command: ./bin/docker-entrypoint-worker.sh
    depends_on:
      plane-api:
        condition: service_healthy
    environment:
      <<: *backend-env
    networks:
      - plane-net

  # ── Celery beat (scheduled tasks) ────────────────────────────────────────
  plane-beat:
    image: makeplane/plane-backend:stable
    restart: unless-stopped
    command: ./bin/docker-entrypoint-beat.sh
    depends_on:
      plane-api:
        condition: service_healthy
    environment:
      <<: *backend-env
    networks:
      - plane-net

  # ── PostgreSQL (OSS) ──────────────────────────────────────────────────────
  plane-db:
    image: postgres:15-alpine
    restart: unless-stopped
    command: postgres -c 'max_connections=500' -c 'shared_buffers=256MB'
    environment:
      POSTGRES_USER:     plane
      POSTGRES_PASSWORD: plane
      POSTGRES_DB:       plane
    ports:
      - "127.0.0.1:5433:5432"   # localhost-only; for postgresql-mcp from host
    volumes:
      - plane-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "plane"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - plane-net

  # ── Redis (OSS) ───────────────────────────────────────────────────────────
  plane-redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    volumes:
      - plane-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - plane-net

  # ── MinIO — open-source S3-compatible object storage (NO AWS) ────────────
  plane-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-plane}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-plane-minio-secret}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - plane-minio-data:/data
    networks:
      - plane-net

volumes:
  plane-db-data:
  plane-redis-data:
  plane-minio-data:
  plane-logs:

networks:
  plane-net:
    driver: bridge
