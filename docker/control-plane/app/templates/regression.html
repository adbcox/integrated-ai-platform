{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Regression Probe</h1>
<p class="text-sm text-slate-400 mb-4">
  Tier 3. Runs <code>docs/phase-13/h1-regression-probe.sh</code> on the host
  via the trigger watcher. Output is captured + base64-encoded.
</p>
<form hx-post="/api/regression/run"
      hx-headers='{"Content-Type":"application/json"}'
      hx-target="#regression-result"
      hx-swap="innerHTML"
      hx-on::response-error="if(event.detail.xhr.status===401){openTier3Modal()}"
      hx-vals='js:{gate_id: document.getElementById("gate-id").value}'
      hx-ext="json-enc"
      class="flex items-center gap-3 mb-4">
  <input id="gate-id" name="gate_id" value="ad-hoc"
         class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm">
  <button class="rounded bg-amber-700 hover:bg-amber-600 px-3 py-1.5 text-sm">
    Run probe
  </button>
</form>
<pre id="regression-result" class="text-xs text-slate-300 whitespace-pre-wrap"></pre>
{% endblock %}
