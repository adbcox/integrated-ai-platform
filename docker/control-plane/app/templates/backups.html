{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Backups</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div class="rounded border border-slate-800 bg-slate-900 p-4">
    <h2 class="text-sm uppercase text-slate-400">Last backup</h2>
    <div hx-get="/ui/_partials/last-backup" hx-trigger="load, every 30s" class="mt-2"></div>
  </div>
  <div class="rounded border border-slate-800 bg-slate-900 p-4">
    <h2 class="text-sm uppercase text-slate-400">Manual backup</h2>
    <p class="text-xs text-slate-400 mb-3">Tier 3. Operator re-auth required. May take several minutes.</p>
    <button
      class="rounded bg-amber-700 hover:bg-amber-600 px-3 py-1.5 text-sm"
      hx-post="/api/backups/run"
      hx-confirm="Run a manual Restic backup now?"
      hx-target="#backup-result"
      hx-swap="innerHTML"
      hx-on::response-error="if(event.detail.xhr.status===401){openTier3Modal()}">
      Run backup now
    </button>
    <pre id="backup-result" class="mt-3 text-xs text-slate-300 whitespace-pre-wrap"></pre>
  </div>
</div>
{% endblock %}
