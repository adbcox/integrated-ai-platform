<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Control Plane" }}</title>
  <script src="/static/htmx.min.js"></script>
  <script src="/static/cp.js"></script>
  <link rel="stylesheet" href="/static/tw.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 bg-slate-900">
    <div class="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/" class="font-semibold text-lg">Control Plane</a>
        <nav class="flex gap-3 text-sm">
          <a href="/ui/containers" class="hover:text-cyan-400">Containers</a>
          <a href="/ui/services" class="hover:text-cyan-400">Services</a>
          <a href="/ui/registry" class="hover:text-cyan-400">Registry</a>
          <a href="/ui/backups" class="hover:text-cyan-400">Backups</a>
          <a href="/ui/credentials" class="hover:text-cyan-400">Credentials</a>
          <a href="/ui/audit" class="hover:text-cyan-400">Audit</a>
          <a href="/ui/regression" class="hover:text-cyan-400">Regression</a>
        </nav>
      </div>
      <div id="auth-banner" hx-get="/ui/_auth-banner" hx-trigger="load, every 30s" class="text-xs"></div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <div id="modal-root"></div>

  <footer class="mt-12 border-t border-slate-800 py-4">
    <div class="mx-auto max-w-7xl px-4 text-xs text-slate-500">
      Operator Control Plane · {{ version }} · tailnet-only
    </div>
  </footer>
</body>
</html>
