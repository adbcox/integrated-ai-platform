version: "3.9"

# Block 2.5 P2.4 — operator control plane.
# Canonical Vault Agent sidecar pattern + dedicated docker-socket-proxy
# sibling. Audit log + Caddy access log mounted RO from existing named
# volumes (vault_vault-logs, caddy-logs).

services:
  # ── Sidecar: Vault Agent renders creds at startup, exits 0 ─────────
  vault-agent-control-plane:
    image: hashicorp/vault:2.0.0
    container_name: vault-agent-control-plane
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      SKIP_SETCAP: "true"
    volumes:
      - /Users/admin/.vault-approle/control-plane:/vault/approle:ro
      - /Users/admin/.vault-agent-secrets/control-plane:/vault/secrets
      - ./vault-agent/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault-agent/credentials.env.tmpl:/vault/agent-config/credentials.env.tmpl:ro
    command: agent -config=/vault/config/agent.hcl
    networks:
      - control-center-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # ── Sibling: Docker socket proxy with allowlist ────────────────────
  # control-plane never sees /var/run/docker.sock directly. All Docker
  # API calls go through this hardened proxy on a private bridge.
  docker-socket-proxy-control:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: docker-socket-proxy-control
    restart: unless-stopped
    environment:
      CONTAINERS: "1"   # list, inspect, logs
      INFO: "1"
      POST: "1"          # restart, stop, start
      EXEC: "1"          # gated in app code by container label
      IMAGES: "0"
      BUILD: "0"
      VOLUMES: "0"
      NETWORKS: "0"
      SYSTEM: "0"
      AUTH: "0"
      SECRETS: "0"
      SERVICES: "0"
      TASKS: "0"
      NODES: "0"
      SWARM: "0"
      PLUGINS: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - control-plane-net
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run
    mem_limit: 64m
    cpus: 0.25
    labels:
      com.iap.service: "docker-socket-proxy-control"
      com.iap.tier: "control-center"

  # ── Main service ────────────────────────────────────────────────────
  control-plane:
    image: iap/control-plane:1.0.0
    container_name: control-plane
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      vault-agent-control-plane:
        condition: service_completed_successfully
      docker-socket-proxy-control:
        condition: service_started
    ports:
      # Bound to host loopback only — Caddy reaches via
      # host.docker.internal:8086 from caddy-net side. Off-tailnet
      # 403'd at Caddy. Doubly gated: control-plane re-checks tailnet
      # CIDR in app/auth.py.
      - "127.0.0.1:8086:8086"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      DOCKER_HOST: "tcp://docker-socket-proxy-control:2375"
      AUDIT_LOG_PATH: "/vault/logs/audit.log"
      CADDY_ACCESS_LOG_PATH: "/var/log/caddy/access.log"
      TRIGGER_DIR: "/var/run/iap"
      SERVICE_REGISTRY_PATH: "/app/service-registry.yaml"
      ACTIONS_LOG_PATH: "/var/log/control-plane/actions.jsonl"
      TIER3_WINDOW_SECONDS: "300"
      TAILNET_CIDR: "100.64.0.0/10"
      REQUIRE_TAILNET: "true"
    volumes:
      # Rendered credentials from sidecar (RO)
      - /Users/admin/.vault-agent-secrets/control-plane:/vault/secrets:ro
      # Vault audit log (RO) — Phase 3 P3.5 reads this
      - vault_vault-logs:/vault/logs:ro
      # Caddy access log (RO) — Phase 3 P3.5 reads this
      - caddy-logs:/var/log/caddy:ro
      # Trigger files (RW) — host launchd watcher consumes these
      - /Users/admin/iap-triggers:/var/run/iap
      # Service registry (RO) — Phase 3 P3.8 reads this; alternatively
      # the registry module proxies topology-api which is already
      # parsing the same file.
      - ../../config/service-registry.yaml:/app/service-registry.yaml:ro
      # Control-plane action log (RW)
      - control-plane-actions:/var/log/control-plane
    entrypoint:
      - sh
      - -c
      - "set -a && . /vault/secrets/credentials.env && set +a && exec uvicorn app.main:app --host 0.0.0.0 --port 8086"
    networks:
      - control-plane-net
      - control-center-net
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      # DAC_READ_SEARCH so the in-container root user can read the
      # 0600 vault audit log mounted RO from vault_vault-logs (owned
      # by vault uid 100). Container is read-only at the FS layer
      # and the only mounts are tightly scoped (audit, access logs,
      # registry yaml, trigger dir).
      - DAC_READ_SEARCH
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      com.iap.service: "control-plane"
      com.iap.tier: "control-center"
      com.iap.exec.allowed: ""   # control-plane itself: no exec allowed via web

volumes:
  # Existing named volumes from other compose stacks; declared external
  # so we attach without recreating.
  vault_vault-logs:
    name: vault_vault-logs
    external: true
  caddy-logs:
    name: caddy-logs
    external: true

  # New named volume owned by this stack
  control-plane-actions:
    name: control-plane-actions

networks:
  control-plane-net:
    name: control-plane-net
    driver: bridge
  control-center-net:
    name: control-center-net
    external: true
