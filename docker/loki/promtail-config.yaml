server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: caddy-access
    static_configs:
      - targets: [localhost]
        labels:
          job: caddy
          platform: mac-mini
          __path__: /var/log/caddy/access.log
    pipeline_stages:
      - json:
          expressions:
            log_ts:      ts
            req_host:    request.host
            req_method:  request.method
            req_uri:     request.uri
            resp_status: status
            duration:    duration
            remote_ip:   request.remote_ip
      - labels:
          req_host:
          resp_status:
          req_method:
      - timestamp:
          source: log_ts
          format: Unix
