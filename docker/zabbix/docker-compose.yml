services:
  vault-agent-zabbix-postgres:
    image: hashicorp/vault:2.0.0
    container_name: vault-agent-zabbix-postgres
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      SKIP_SETCAP: "true"
    volumes:
      - /Users/admin/.vault-approle/zabbix-postgres:/vault/approle:ro
      - /Users/admin/.vault-agent-secrets/zabbix-postgres:/vault/secrets
      - ./vault-agent-zabbix-postgres/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault-agent-zabbix-postgres/credentials.env.tmpl:/vault/agent-config/credentials.env.tmpl:ro
    command: agent -config=/vault/config/agent.hcl
    networks:
      - control-center-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  postgres-server:
    image: timescale/timescaledb:${TIMESCALEDB_IMAGE_TAG:-latest-pg16}
    container_name: zabbix-postgres
    restart: unless-stopped
    shm_size: "256m"
    depends_on:
      vault-agent-zabbix-postgres:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - zabbix-pgdata:/var/lib/postgresql/data
      - ./postgres/backups:/backups
      - /Users/admin/.vault-agent-secrets/zabbix-postgres:/vault/secrets:ro
    entrypoint: ["sh", "-c", "set -a && . /vault/secrets/credentials.env && set +a && exec docker-entrypoint.sh \"$$0\" \"$$@\""]
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-12GB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-36GB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-2GB}"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=500"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-64MB}"
      - "-c"
      - "min_wal_size=256MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=4"
    networks:
      - zabbix-net
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-agent-zabbix-server:
    image: hashicorp/vault:2.0.0
    container_name: vault-agent-zabbix-server
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      SKIP_SETCAP: "true"
    volumes:
      - /Users/admin/.vault-approle/zabbix-server:/vault/approle:ro
      - /Users/admin/.vault-agent-secrets/zabbix-server:/vault/secrets
      - ./vault-agent-zabbix-server/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault-agent-zabbix-server/credentials.env.tmpl:/vault/agent-config/credentials.env.tmpl:ro
    command: agent -config=/vault/config/agent.hcl
    networks:
      - control-center-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:${ZABBIX_IMAGE_TAG:-alpine-7.4-latest}
    container_name: zabbix-server
    restart: unless-stopped
    ports:
      - "10051:10051"
    environment:
      DB_SERVER_HOST: postgres-server
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      ZBX_SERVER_NAME: ${ZBX_SERVER_NAME}
      ZBX_DEBUGLEVEL: ${ZBX_DEBUGLEVEL:-3}
      ZBX_CACHESIZE: 1G
      ZBX_HISTORYCACHESIZE: 512M
      ZBX_TRENDCACHESIZE: 256M
      ZBX_VALUECACHESIZE: 512M
    volumes:
      - ./server/alertscripts:/usr/lib/zabbix/alertscripts
      - ./server/externalscripts:/usr/lib/zabbix/externalscripts
      - /Users/admin/.vault-agent-secrets/zabbix-server:/vault/secrets:ro
    entrypoint: ["sh", "-c", "set -a && . /vault/secrets/credentials.env && set +a && exec /usr/bin/docker-entrypoint.sh \"$$0\" \"$$@\""]
    command: ["/usr/sbin/zabbix_server", "--foreground", "-c", "/etc/zabbix/zabbix_server.conf"]
    depends_on:
      vault-agent-zabbix-server:
        condition: service_completed_successfully
      postgres-server:
        condition: service_healthy
    networks:
      - zabbix-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 2g
    cpus: 2.0

  vault-agent-zabbix-web:
    image: hashicorp/vault:2.0.0
    container_name: vault-agent-zabbix-web
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      SKIP_SETCAP: "true"
    volumes:
      - /Users/admin/.vault-approle/zabbix-web:/vault/approle:ro
      - /Users/admin/.vault-agent-secrets/zabbix-web:/vault/secrets
      - ./vault-agent-zabbix-web/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault-agent-zabbix-web/credentials.env.tmpl:/vault/agent-config/credentials.env.tmpl:ro
    command: agent -config=/vault/config/agent.hcl
    networks:
      - control-center-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:${ZABBIX_IMAGE_TAG:-alpine-7.4-latest}
    container_name: zabbix-web
    restart: unless-stopped
    ports:
      - "${ZBX_WEB_PORT:-10080}:8080"
      - "10443:8443"
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: postgres-server
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PHP_TZ: ${PHP_TZ:-America/New_York}
      ZBX_SERVER_NAME: ${ZBX_SERVER_NAME}
    volumes:
      - /Users/admin/.vault-agent-secrets/zabbix-web:/vault/secrets:ro
    entrypoint: ["sh", "-c", "set -a && . /vault/secrets/credentials.env && set +a && exec docker-entrypoint.sh"]
    depends_on:
      vault-agent-zabbix-web:
        condition: service_completed_successfully
      postgres-server:
        condition: service_started
      zabbix-server:
        condition: service_started
    networks:
      - zabbix-net
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

  zabbix-agent:
    image: zabbix/zabbix-agent:${ZABBIX_IMAGE_TAG:-alpine-7.4-latest}
    container_name: zabbix-agent
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: zabbix-server
      # ZBX_HOSTNAME must match the host registered in zabbix-web; "mac-mini"
      # aligns with the platform host id used in service-registry.yaml.
      ZBX_HOSTNAME: mac-mini
      ZBX_SERVER_ACTIVE: zabbix-server
    depends_on:
      - zabbix-server
    networks:
      - zabbix-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m

networks:
  zabbix-net:
    name: zabbix-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
  control-center-net:
    name: control-center-net
    external: true

volumes:
  zabbix-pgdata:
    name: zabbix-pgdata
