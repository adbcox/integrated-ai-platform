version: "3.9"

services:
  vault-agent-scraparr:
    image: hashicorp/vault:2.0.0
    container_name: vault-agent-scraparr
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      SKIP_SETCAP: "true"
    volumes:
      - /Users/admin/.vault-approle/scraparr:/vault/approle:ro
      - /Users/admin/.vault-agent-secrets/scraparr:/vault/secrets
      - ./vault-agent-scraparr/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault-agent-scraparr/credentials.env.tmpl:/vault/agent-config/credentials.env.tmpl:ro
    command: agent -config=/vault/config/agent.hcl
    networks:
      - control-center-net
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]

  scraparr:
    image: ghcr.io/thecfu/scraparr:latest
    container_name: scraparr
    restart: unless-stopped
    depends_on:
      vault-agent-scraparr:
        condition: service_completed_successfully
    environment:
      SONARR_URL: "http://sonarr:8989"
      RADARR_URL: "http://radarr:7878"
      PROWLARR_URL: "http://prowlarr:9696"
    entrypoint: ["sh", "-c", "set -a && . /vault/secrets/credentials.env && set +a && exec python -m scraparr.scraparr"]
    volumes:
      - /Users/admin/.vault-agent-secrets/scraparr:/vault/secrets:ro
    ports:
      - "7100:7100"
    networks:
      - control-center-net
      - observability
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]

networks:
  control-center-net:
    name: control-center-net
    external: true
  observability:
    name: observability
    external: true
