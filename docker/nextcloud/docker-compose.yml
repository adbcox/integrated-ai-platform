version: "3.9"

services:
  vault-agent-nextcloud-db:
    image: hashicorp/vault:2.0.0
    container_name: vault-agent-nextcloud-db
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault-server:8200"
      SKIP_SETCAP: "true"
    volumes:
      - /Users/admin/.vault-approle/nextcloud-db:/vault/approle:ro
      - /Users/admin/.vault-agent-secrets/nextcloud-db:/vault/secrets
      - ./vault-agent-nextcloud-db/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault-agent-nextcloud-db/credentials.env.tmpl:/vault/agent-config/credentials.env.tmpl:ro
    command: agent -config=/vault/config/agent.hcl
    networks:
      - control-center-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    depends_on:
      vault-agent-nextcloud-db:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
    volumes:
      - nextcloud-db-data:/var/lib/postgresql/data
      - /Users/admin/.vault-agent-secrets/nextcloud-db:/vault/secrets:ro
    entrypoint: ["sh", "-c", "set -a && . /vault/secrets/credentials.env && set +a && exec docker-entrypoint.sh \"$$0\" \"$$@\""]
    command: ["postgres"]
    networks:
      - nextcloud-net
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    image: nextcloud:29-apache
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "192.168.10.145 nextcloud.internal"
      NEXTCLOUD_UPDATE: "1"
    volumes:
      - nextcloud-data:/var/www/html
    depends_on:
      nextcloud-db:
        condition: service_healthy
    networks:
      - nextcloud-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/status.php | grep -q '\"installed\":true'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    labels:
      com.iap.service: "nextcloud"
      com.iap.tier: "platform"

volumes:
  nextcloud-db-data:
    name: nextcloud-db-data
  nextcloud-data:
    name: nextcloud-data

networks:
  nextcloud-net:
    name: nextcloud-net
    driver: bridge
  control-center-net:
    name: control-center-net
    external: true
