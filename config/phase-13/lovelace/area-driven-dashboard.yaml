# Phase 13 Block 3 P5 — Area-driven Lovelace dashboard framework
#
# Design principles (platform-layer, not device-population):
#   - Each of the 15 HA Areas becomes one view
#   - Cards filter by `area: <id>` rather than hard-coding entity_ids,
#     so devices light up in their room as they're paired (without ever
#     editing this YAML again)
#   - Layout uses HA 2024.3+ "sections" view (responsive grid, no manual
#     column math)
#   - View identifiers use a-z0-9 hyphen-cased slugs to match the
#     hostnames used in `voice-satellite-template.yaml` per-room mapping —
#     keeps voice + dashboard slugs consistent
#
# Deployment (when ready):
#   1. Copy this file to the HA host: /config/dashboards/area-driven.yaml
#      (via SSH add-on or Studio Code Server)
#   2. Add to /config/configuration.yaml:
#        lovelace:
#          mode: storage  # keep storage-mode dashboards as the default UI
#          dashboards:
#            area-driven:
#              mode: yaml
#              filename: dashboards/area-driven.yaml
#              title: "Areas"
#              icon: mdi:home-map-marker
#              show_in_sidebar: true
#              require_admin: false
#   3. Reload Lovelace + check sidebar
#
# Per-room views are intentionally identical templates. As HA's auto-card
# generator gets smarter, the by-area filters will grow to display
# room-specific media (e.g. Cast targets for media rooms).

title: "Areas"

views:

  # ── Foyer ─────────────────────────────────────────────────────────────
  - title: "Foyer"
    path: foyer
    icon: mdi:door
    type: sections
    sections: &area_sections_template
      - type: grid
        cards:
          - type: heading
            heading: "Lights"
          - type: entities
            filter:
              include:
                - domain: light
                  area: foyer
            show_empty: false
          - type: heading
            heading: "Climate"
          - type: entities
            filter:
              include:
                - domain: climate
                  area: foyer
                - domain: sensor
                  area: foyer
                  device_class: temperature
                - domain: sensor
                  area: foyer
                  device_class: humidity
            show_empty: false
          - type: heading
            heading: "Media"
          - type: entities
            filter:
              include:
                - domain: media_player
                  area: foyer
            show_empty: false
          - type: heading
            heading: "Sensors"
          - type: entities
            filter:
              include:
                - domain: binary_sensor
                  area: foyer
                - domain: sensor
                  area: foyer
            exclude:
              - device_class: temperature
              - device_class: humidity
            show_empty: false

  # The remaining 14 views follow the same template — `area:` filter
  # changes per view. Anchor (&area_sections_template) above is for
  # documentation; YAML anchors don't work across views in Lovelace
  # YAML mode, so each view repeats the structure verbatim. Sed-friendly:
  #   sed 's/area: foyer/area: kitchen/g' carves a new view from any
  #   existing one.

  - title: "Kitchen"
    path: kitchen
    icon: mdi:silverware-fork-knife
    type: sections
    sections:
      - type: grid
        cards:
          - { type: heading, heading: "Lights" }
          - { type: entities, filter: { include: [{ domain: light, area: kitchen }] }, show_empty: false }
          - { type: heading, heading: "Climate" }
          - { type: entities, filter: { include: [{ domain: climate, area: kitchen }, { domain: sensor, area: kitchen, device_class: temperature }, { domain: sensor, area: kitchen, device_class: humidity }] }, show_empty: false }
          - { type: heading, heading: "Media" }
          - { type: entities, filter: { include: [{ domain: media_player, area: kitchen }] }, show_empty: false }
          - { type: heading, heading: "Sensors" }
          - { type: entities, filter: { include: [{ domain: binary_sensor, area: kitchen }, { domain: sensor, area: kitchen }], exclude: [{ device_class: temperature }, { device_class: humidity }] }, show_empty: false }

