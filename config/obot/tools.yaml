# Obot P0 MCP Tool Definitions — integrated-AI-platform
# Applied by: bin/register_obot_tools.py (POST to Obot API after startup)
#
# P0 = Must-have for core platform operation
# P1 = Month 1 additions (Ollama, Sequential, Brave, SQLite, Memory)

tools:

  # ── P0-1: GitHub MCP ────────────────────────────────────────────────────────
  github:
    id: github-mcp
    name: "GitHub"
    description: "Read/write GitHub repos, issues, PRs, and actions for adbcox/integrated-ai-platform"
    tier: P0
    package: "@modelcontextprotocol/server-github"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    rbac:
      Admin: [read, write, admin]
      Dev:   [read, write]
      Agent: [read]
    status: BLOCKED_BY_CREDENTIAL  # Set GITHUB_TOKEN in docker/.env

  # ── P0-2: Filesystem MCP ────────────────────────────────────────────────────
  filesystem:
    id: filesystem-mcp
    name: "Filesystem"
    description: "Read/write access to the integrated-ai-platform repository workspace"
    tier: P0
    package: "@modelcontextprotocol/server-filesystem"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
    env: {}
    rbac:
      Admin: [read, write, admin]
      Dev:   [read, write]
      Agent: [read]
    status: READY

  # ── P0-3: PostgreSQL MCP ─────────────────────────────────────────────────────
  postgresql:
    id: postgresql-mcp
    name: "PostgreSQL (Plane)"
    description: "Query Plane CE's Postgres database (plane/plane@plane-db:5432/plane)"
    tier: P0
    package: "@modelcontextprotocol/server-postgres"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-postgres", "${POSTGRES_DSN}"]
    env:
      POSTGRES_DSN: "postgresql://plane:plane@docker-plane-db-1:5432/plane"
    rbac:
      Admin: [read, write, admin]
      Dev:   [read]
      Agent: [read]
    status: READY  # credentials embedded, reachable on docker_plane-net

  # ── P0-4: Plane MCP ──────────────────────────────────────────────────────────
  plane:
    id: plane-roadmap-mcp
    name: "Plane Roadmap"
    description: "CRUD access to Plane CE roadmap: list/get/create/update issues, search, stats"
    tier: P0
    transport: stdio
    command: python3
    args: ["/workspace/mcp/plane_mcp_server.py"]
    env:
      PLANE_URL: "${PLANE_URL}"
      PLANE_API_TOKEN: "${PLANE_API_TOKEN}"
      PLANE_WORKSPACE: "${PLANE_WORKSPACE}"
      PLANE_PROJECT_ID: "${PLANE_PROJECT_ID}"
      REPO_ROOT: "/workspace"
    rbac:
      Admin: [read, write, admin]
      Dev:   [read, write]
      Agent: [read, write]
    status: READY

  # ── P0-5: Docker MCP ─────────────────────────────────────────────────────────
  docker:
    id: docker-mcp
    name: "Docker"
    description: "Inspect and manage Docker containers/images/volumes on this host"
    tier: P0
    package: "mcp-server-docker"
    transport: stdio
    command: uvx
    args: ["mcp-server-docker"]
    env: {}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    rbac:
      Admin: [read, write, admin]
      Dev:   [read]
      Agent: [read]
    status: READY

  # ── P2 tools (Phase 9 — Personal + Coding + Security) ──────────────────────

  # ── P2-1: Code Research ──────────────────────────────────────────────────────
  code-research:
    id: code-research-mcp
    name: "Code Research"
    description: "Search Stack Overflow, MDN, GitHub, npm, and PyPI for code answers"
    tier: P2
    transport: stdio
    command: node
    args: ["/Users/admin/mcp-servers/code-research/build/index.js"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"   # optional — raises rate limit
    rbac:
      Admin: [read, write]
      Dev:   [read, write]
      Agent: [read]
    status: READY

  # ── P2-2: Docs ───────────────────────────────────────────────────────────────
  docs:
    id: docs-mcp
    name: "Docs"
    description: "Scrape and search documentation for any library or framework"
    tier: P2
    transport: stdio
    command: node
    args: ["/Users/admin/mcp-servers/docs/dist/index.js"]
    env: {}
    rbac:
      Admin: [read, write]
      Dev:   [read, write]
      Agent: [read]
    status: READY

  # ── P2-3: Brave Search ───────────────────────────────────────────────────────
  brave-search:
    id: brave-search-mcp
    name: "Brave Search"
    description: "Web, image, video, and news search via Brave Search API"
    tier: P2
    transport: stdio
    command: /Users/admin/mcp-servers/brave/node_modules/.bin/brave-search-mcp-server
    args: []
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
    rbac:
      Admin: [read, write]
      Dev:   [read, write]
      Agent: [read]
    status: BLOCKED_BY_CREDENTIAL  # Set BRAVE_API_KEY in docker/.env

  # ── P2-4: Strava ─────────────────────────────────────────────────────────────
  strava:
    id: strava-mcp
    name: "Strava"
    description: "Triathlon training: activities, segments, routes, athlete stats (OAuth)"
    tier: P2
    transport: stdio
    command: node
    args: ["/Users/admin/mcp-servers/strava/dist/server.js"]
    env:
      STRAVA_CLIENT_ID: "${STRAVA_CLIENT_ID}"
      STRAVA_CLIENT_SECRET: "${STRAVA_CLIENT_SECRET}"
      STRAVA_ACCESS_TOKEN: "${STRAVA_ACCESS_TOKEN}"
      STRAVA_REFRESH_TOKEN: "${STRAVA_REFRESH_TOKEN}"
    rbac:
      Admin: [read, write]
      Dev:   [read]
      Agent: [read]
    status: BLOCKED_BY_CREDENTIAL  # Set STRAVA_* in docker/.env, then OAuth via Claude

  # ── P2-5: Health & Fitness ───────────────────────────────────────────────────
  health-fitness:
    id: health-fitness-mcp
    name: "Health & Fitness"
    description: "BMI, TDEE, macros, workouts, heart rate zones, nutrition, sleep"
    tier: P2
    transport: stdio
    command: /Users/admin/mcp-servers/health/node_modules/.bin/health-fitness-mcp
    args: []
    env: {}
    rbac:
      Admin: [read, write]
      Dev:   [read, write]
      Agent: [read, write]
    status: READY

  # ── P2-6: Plex ───────────────────────────────────────────────────────────────
  plex:
    id: plex-mcp
    name: "Plex"
    description: "Browse and manage Plex media library"
    tier: P2
    transport: stdio
    command: node
    args: ["/Users/admin/mcp-servers/plex/build/plex-mcp-server.js"]
    env:
      PLEX_URL: "${PLEX_URL}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
    rbac:
      Admin: [read, write]
      Dev:   [read]
      Agent: [read]
    status: BLOCKED_BY_CREDENTIAL  # Set PLEX_URL and PLEX_TOKEN in docker/.env

  # ── P2-7: Home Assistant ─────────────────────────────────────────────────────
  home-assistant:
    id: home-assistant-mcp
    name: "Home Assistant"
    description: "Smart home device control and state queries for .141"
    tier: P2
    transport: stdio
    command: /Users/admin/mcp-servers/home-assistant/node_modules/.bin/home-mcp
    args: []
    env:
      HA_BASE_URL: "${HA_BASE_URL:-http://192.168.10.141:8123}"
      HA_TOKEN: "${HA_TOKEN}"
    rbac:
      Admin: [read, write]
      Dev:   [read]
      Agent: [read]
    status: BLOCKED_BY_CREDENTIAL  # Set HA_TOKEN in docker/.env

  # ── P2-8: Weather ────────────────────────────────────────────────────────────
  weather:
    id: weather-mcp
    name: "Weather"
    description: "Global weather: forecast, historical, air quality, marine (open-meteo, no auth)"
    tier: P2
    transport: stdio
    command: /Users/admin/mcp-servers/weather/node_modules/.bin/open-meteo-mcp-server
    args: []
    env: {}
    rbac:
      Admin: [read, write]
      Dev:   [read, write]
      Agent: [read, write]
    status: READY

  # ── P2-9: Semgrep ────────────────────────────────────────────────────────────
  semgrep:
    id: semgrep-mcp
    name: "Semgrep"
    description: "Static analysis: scan directories, list rules, create/filter/export results"
    tier: P2
    transport: stdio
    command: /Users/admin/mcp-servers/semgrep/node_modules/.bin/mcp-server-semgrep
    args: []
    env: {}
    rbac:
      Admin: [read, write, admin]
      Dev:   [read, write]
      Agent: [read]
    status: READY  # semgrep CLI installed at /opt/homebrew/bin/semgrep

# ── P1 tools (Month 1 — managed separately) ───────────────────────────────────
# sequential-thinking, memory, sqlite are DEPLOYED directly in ~/.claude.json
# Ollama runs natively at localhost:11434 (not MCP — called via HTTP API)

p1_tools:
  ollama:
    id: ollama-mcp
    tier: P1
    description: "Native Ollama at localhost:11434 — NOT an MCP server; called via HTTP"
    models: [qwen2.5-coder:32b, devstral:latest, deepseek-coder-v2, qwen2.5-coder:14b, qwen2.5-coder:7b]
    status: RUNNING_NATIVE  # No container needed; use http://localhost:11434 directly

  sequential-thinking:
    id: sequential-thinking-mcp
    tier: P1
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    transport: stdio
    status: DEPLOYED  # Active in ~/.claude.json
    rbac:
      Admin: [read, write]
      Dev:   [read, write]
      Agent: [read, write]

  sqlite:
    id: sqlite-mcp
    tier: P1
    command: uvx
    args: ["mcp-server-sqlite", "--db-path", "/workspace/data/platform_analytics.db"]
    transport: stdio
    status: DEPLOYED  # Active in ~/.claude.json
    rbac:
      Admin: [read, write]
      Dev:   [read, write]
      Agent: [read, write]

  memory:
    id: memory-mcp
    tier: P1
    command: npx
    args: ["-y", "@modelcontextprotocol/server-memory"]
    transport: stdio
    status: DEPLOYED  # Active in ~/.claude.json
    rbac:
      Admin: [read, write]
      Dev:   [read, write]
      Agent: [read, write]
