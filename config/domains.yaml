# Domain Configuration
# Defines task types that can be submitted to the job framework

domains:
  coding:
    enabled: true
    module: "domains.coding"
    class: "CodingDomain"
    description: "Code modification and automation via Aider"
    job_class: "CODING_TASK"
    parameters:
      model: "qwen2.5-coder:14b"
      executor: "aider"

  media:
    enabled: false
    module: "domains.media"
    class: "MediaDomain"
    description: "Media acquisition and metadata management"
    job_class: "MEDIA_TASK"
    parameters:
      default_connector: "arr_stack"

MediaDomain:
  enabled: true
  parameters:
    sonarr_url: "http://192.168.10.201:8989"
    radarr_url: "http://192.168.10.201:7878"
    prowlarr_url: "http://192.168.10.201:9696"
    plex_url: "http://192.168.10.201:32400"
    # API keys via environment: SONARR_API_KEY, RADARR_API_KEY, PROWLARR_API_KEY, PLEX_TOKEN

HomeDomain:
  enabled: false
  parameters:
    ha_url: "http://homeassistant.local:8123"
    ha_token: ""  # Add when user enables
