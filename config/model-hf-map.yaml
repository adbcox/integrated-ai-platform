# Ollama tag → HuggingFace model ID mapping
# Used by scripts/verify-model-provenance.sh for provenance scan
# Add new entries when pulling a new model via pull-new-model.md
#
# Format:
#   <ollama-tag>: <hf-repo-id>
#
# Notes:
#   - Ollama tags map to the *instruction-tuned* HF variant where applicable.
#   - GGUF quantized models (all Ollama-pulled models) fingerprint against
#     the HF base weights. Expect NO_MATCH or low score — this is informational,
#     not a failure. See docs/architecture-facts/model-provenance-doctrine.md
#     §GGUF-vs-HF section for rationale.
#   - HF IDs must be exact (case-sensitive, org/repo form).

# --- Qwen2.5-Coder family (Mac Mini inference cascade) ---
qwen2.5-coder:7b: Qwen/Qwen2.5-Coder-7B-Instruct
qwen2.5-coder:14b: Qwen/Qwen2.5-Coder-14B-Instruct
qwen2.5-coder:32b: Qwen/Qwen2.5-Coder-32B-Instruct

# --- Qwen3-Coder family (Mac Studio — D-17-97 canonical compute) ---
qwen3-coder:30b: Qwen/Qwen3-Coder-30B-A3B
# qwen3-coder-next HF ID is unverified upstream (flagged D-17-12 INTAKE line 28).
# "qwen3-coder-next" may be an Ollama-specific provisional tag. Provenance scan
# will return unverified until Cisco DB contains this model or HF ID is confirmed.
qwen3-coder-next:latest: Qwen/Qwen3-Coder-Next  # UNVERIFIED — confirm when published

# --- Gemma2 family (Mac Studio) ---
gemma2:27b: google/gemma-2-27b-it

# --- DeepSeek-Coder-V2 (cascade) ---
deepseek-coder-v2:latest: deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct
deepseek-coder-v2:16b: deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct

# --- Devstral (Mistral AI) ---
devstral:latest: mistralai/Devstral-Small-2505

# --- Kimi K2.6 (Moonshot AI — D-17-104 DEFERRED) ---
# 1T total params / 32B active MoE. INT4 floor ~200 GB — exceeds Mac Studio 96 GB pool.
# Hardware-blocked. Ollama only publishes :cloud (API-routed; doctrine-blocked).
# Provenance scan-failed (trust_remote_code=True). Finding 21.
