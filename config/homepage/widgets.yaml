---
# Homepage top-bar widgets
# Docs: https://gethomepage.dev/configs/widgets/

- resources:
    cpu: true
    memory: true
    disk: /
    label: Mac Mini
    expanded: true

- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short
      hour12: true

- search:
    provider: duckduckgo
    focus: false
    target: _blank

