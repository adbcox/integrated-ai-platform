# ── Obot Dynamic MCP Shims ───────────────────────────────────────────────────
# Obot spawns these containers on demand with cryptic IDs (ms1xxxxx pattern).
# Container names are dynamic — registry uses container: null for all shims.
# Each shim = one phat MCP server (parent) + one nanobot shim (child) per tool.

