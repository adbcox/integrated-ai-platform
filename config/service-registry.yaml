# Service Registry — Integrated AI Platform
# Machine-readable CMDB for all platform services.
# This is the canonical source for port assignments, dependencies, and health checks.
# Consumed by: scripts/validate-cmdb.sh, GitHub Actions CI, autonomous agents.
#
# Last updated: 2026-04-26
# Schema: id (required), name (required), host (required), port (required),
#         health_url (required), category (required), depends_on (list),
#         security.no_new_privileges, security.cap_drop

metadata:
  version: "1.0"
  platform: "Integrated AI Platform"
  primary_host: "mac-mini"
  primary_ip: "192.168.10.145"

# ── AI Layer ────────────────────────────────────────────────────────────────
services:

  - id: litellm-gateway
    name: LiteLLM Gateway
    category: ai
    host: mac-mini
    container: litellm-gateway
    image: ghcr.io/berriai/litellm:main-latest
    port: 4000
    internal_port: 4000
    health_url: "http://localhost:4000/health/liveliness"
    health_method: GET
    health_expect: 200
    purpose: Multi-provider LLM routing (Anthropic, OpenAI, Ollama)
    depends_on: []
    security:
      no_new_privileges: true
      cap_drop: [ALL]
    compose_file: control-center-stack/stacks/gateways/docker-compose.yml
    credentials_env: [LITELLM_MASTER_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY]

  - id: open-webui
    name: Open WebUI
    category: ai
    host: mac-mini
    container: open-webui
    image: ghcr.io/open-webui/open-webui:main
    port: 3002
    internal_port: 8080
    health_url: "http://localhost:3002/health"
    health_method: GET
    health_expect: 200
    purpose: Multi-model AI chat frontend with RAG
    depends_on: [litellm-gateway, ollama]
    security:
      no_new_privileges: true
      cap_drop: [ALL]
    compose_file: control-center-stack/stacks/ai-control/docker-compose.yml
    credentials_env: [WEBUI_SECRET_KEY, LITELLM_MASTER_KEY]

  - id: ollama
    name: Ollama
    category: ai
    host: mac-mini
    container: null
    image: null
    port: 11434
    internal_port: 11434
    health_url: "http://localhost:11434/api/tags"
    health_method: GET
    health_expect: 200
    purpose: "Local LLM runtime (5 models: qwen2.5-coder variants, deepseek-coder-v2)"
    depends_on: []
    security:
      no_new_privileges: null
      cap_drop: null
    compose_file: null
    notes: host process, not containerized

  - id: obot
    name: Obot
    category: ai
    host: mac-mini
    container: obot
    image: obot/obot:latest
    port: 8090
    internal_port: 8080
    health_url: "http://localhost:8090/api/healthz"
    health_method: GET
    health_expect: 200
    purpose: AI agent orchestrator with MCP tool integration
    depends_on: [litellm-gateway]
    security:
      no_new_privileges: false
      cap_drop: []
    compose_file: docker/obot-stack.yml
    notes: OAuth browser setup pending; sms1obot-mcp-server companion containers on ports 32768/32769

  - id: openhands
    name: OpenHands
    category: ai
    host: mac-mini
    container: openhands-app
    image: custom
    port: 3000
    internal_port: 3000
    health_url: "http://localhost:3000/"
    health_method: GET
    health_expect: 200
    purpose: AI software engineering agent
    depends_on: [litellm-gateway]
    security:
      no_new_privileges: false
      cap_drop: []
    compose_file: docker/docker-compose-ai-dashboard.yml
    notes: Not yet in primary service documentation; running live

  - id: mcpo-proxy
    name: MCPO Proxy
    category: ai
    host: mac-mini
    container: mcpo-proxy
    image: nikolaik/python-nodejs:python3.12-nodejs22-slim
    port: 8081
    internal_port: 8081
    health_url: "http://localhost:8081/openapi.json"
    health_method: GET
    health_expect: 200
    purpose: MCP stdio to OpenAPI bridge — exposes filesystem MCP as HTTP tools for Open WebUI
    depends_on: []
    security:
      no_new_privileges: true
      cap_drop: [ALL]
    compose_file: control-center-stack/stacks/gateways/docker-compose.yml
    notes: "Port 8081, NOT 8080 — 8080 is IAP Dashboard (host service)"

# ── Platform Core ────────────────────────────────────────────────────────────

