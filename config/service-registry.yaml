  # service-registry.yaml.DEPRECATED with a header pointing at NetBox.
  - id: netbox
    name: NetBox CMDB
    category: cmdb
    host: mac-mini
    container: netbox
    image: docker.io/netboxcommunity/netbox:v4.5-4.0.2
    port: 8080
    internal_port: 8080
    health_url: "http://localhost:8080/login/"
    health_method: GET
    health_expect: 200
    purpose: |
      Source-of-truth CMDB for the platform. Hosts services, devices,
      dependencies, and Vault-path cross-references. Replaces
      config/service-registry.yaml; Block 4.C C5 deprecates the YAML.
      Block 4.D layers InvenTree on top for hardware-asset inventory.
    depends_on: [vault-server, netbox-postgres, netbox-redis, netbox-redis-cache]
    security:
      no_new_privileges: true
      cap_drop: [ALL]
      cap_add: [CHOWN, SETUID, SETGID, FOWNER, DAC_OVERRIDE, NET_BIND_SERVICE]
      read_only: false
    compose_file: docker/netbox/docker-compose.yml
    credentials: [postgres_password, redis_password, redis_cache_password, secret_key, api_token_pepper, admin_password, api_token]
    notes: |
      Block 4.C (2026-04-29): deployed via Vault Agent sidecar pattern.
      Vault policy `netbox` (config/vault-policies/netbox-policy.hcl);
      AppRole `netbox`. Caddy route `netbox.internal`.
      Sibling services: netbox-worker, netbox-housekeeping, netbox-postgres,
      netbox-redis, netbox-redis-cache (separate registry entries).
  - id: netbox-worker
    name: NetBox Worker
    category: cmdb
    host: mac-mini
    container: netbox-worker
    image: docker.io/netboxcommunity/netbox:v4.5-4.0.2
    port: null
    internal_port: null
    health_url: null
    health_method: null
    health_expect: null
    purpose: |
      RQ worker for NetBox async jobs (custom scripts, reports,
      webhook delivery). Same image as netbox app, runs `manage.py
      rqworker`.
    depends_on: [netbox]
    kind: support-service
    sidecar_of: netbox
    security:
      no_new_privileges: true
      cap_drop: [ALL]
      cap_add: [CHOWN, SETUID, SETGID, FOWNER, DAC_OVERRIDE]
      read_only: false
    compose_file: docker/netbox/docker-compose.yml
    credentials: [postgres_password, redis_password, redis_cache_password, secret_key, api_token_pepper]
    notes: |
      Block 4.C (2026-04-29): deployed as part of NetBox stack.
