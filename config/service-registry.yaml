# Service Registry — Integrated AI Platform
# Machine-readable CMDB for all platform services.
# This is the canonical source for port assignments, dependencies, and health checks.
# Consumed by: scripts/validate-cmdb.sh, GitHub Actions CI, autonomous agents.
#
# Last updated: 2026-04-26
# Schema: id (required), name (required), host (required), port (required),
#         health_url (required), category (required), depends_on (list),
#         security.no_new_privileges, security.cap_drop

metadata:
  version: "1.0"
  platform: "Integrated AI Platform"
  primary_host: "mac-mini"
  primary_ip: "192.168.10.145"

# ── AI Layer ────────────────────────────────────────────────────────────────
services:

  - id: litellm-gateway
    name: LiteLLM Gateway
    category: ai
    host: mac-mini
    container: litellm-gateway
    image: ghcr.io/berriai/litellm:main-latest
    port: 4000
    internal_port: 4000
    health_url: "http://localhost:4000/health/liveliness"
    health_method: GET
    health_expect: 200
    purpose: Multi-provider LLM routing (Anthropic, OpenAI, Ollama)
    depends_on: []
    security:
      no_new_privileges: true
      cap_drop: [ALL]
    compose_file: control-center-stack/stacks/gateways/docker-compose.yml
    credentials_env: [LITELLM_MASTER_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY]

  - id: open-webui
