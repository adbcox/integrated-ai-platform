# Service Registry — Integrated AI Platform
# Machine-readable CMDB for all platform services.
# This is the canonical source for port assignments, dependencies, and health checks.
# Consumed by: scripts/validate-cmdb.sh, GitHub Actions CI, autonomous agents.
#
# Last updated: 2026-04-26
# Schema: id (required), name (required), host (required), port (required),
#         health_url (required), category (required), depends_on (list),
#         security.no_new_privileges, security.cap_drop

metadata:
  version: "1.0"
  platform: "Integrated AI Platform"
  primary_host: "mac-mini"
  primary_ip: "192.168.10.145"
# ── AI Layer ────────────────────────────────────────────────────────────────
services:
  - id: litellm-gateway
    name: LiteLLM Gateway
    category: ai
    host: mac-mini
    container: litellm-gateway
    image: ghcr.io/berriai/litellm:main-latest
    port: 4000
    internal_port: 4000
    health_url: "http://localhost:4000/health/liveliness"
    health_method: GET
    health_expect: 200
    purpose: Local-only LLM routing (Ollama models). Cloud routes (Anthropic/OpenAI) removed Phase 13.5.
    depends_on: []
    security:
      no_new_privileges: true
      cap_drop: [ALL]
    compose_file: control-center-stack/stacks/gateways/docker-compose.yml
    credentials_env: [LITELLM_MASTER_KEY]
    notes: |
      Phase 13.5 (2026-04-28): platform now local-only. claude-sonnet, claude-haiku, gpt-4o
      routes removed from litellm_config.yaml; ANTHROPIC_API_KEY and OPENAI_API_KEY removed
      from sidecar template + Vault policy. Anthropic Pro access flows directly through
      `claude-pro` shell function (Claude Code), not through litellm. See CLAUDE.md
      "LLM Access Doctrine".
  - id: open-webui
    name: Open WebUI
    category: ai
    host: mac-mini
    container: open-webui
    image: ghcr.io/open-webui/open-webui:main
