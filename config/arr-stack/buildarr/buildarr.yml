# Buildarr configuration — declarative config-as-code for arr-stack
#
# Scope: Radarr (full Buildarr-plugin coverage) + Prowlarr (applications-only).
#
#   OUT OF SCOPE (documented known limitations for D-17-44):
#     Sonarr v4.0.17: buildarr-sonarr plugin supports v3 only; v4 support pending upstream.
#     Sportarr: no Buildarr plugin exists (official or community).
#     Both remain under reactive/manual management until plugin coverage lands.
#
# Credentials: api_key fields use ${RADARR_API_KEY} / ${PROWLARR_API_KEY} placeholder syntax.
#   Vault Agent sidecar (vault-agent-buildarr) renders credentials.env at runtime.
#   Container entrypoint substitutes placeholders via Python before calling Buildarr.
#   Zero credential values stored in this file or in git.
#
# Extracted from live state: 2026-05-03 via buildarr radarr/prowlarr dump-config
#   Radarr 6.1.1.10360 / Prowlarr 2.3.5.5327
#
# Usage:
#   Apply (live):    docker compose -f docker/docker-compose-buildarr.yml run --rm buildarr
#   Syntax check:    scripts/buildarr-run.sh --check
#   Manual one-shot: scripts/buildarr-run.sh
#
# Doctrine references:
#   D-17-44 (this deliverable), PHASE_ROADMAP §18.G component 2
#   D-17-38 (Vault Agent sidecar credential pattern)
#   D-17-29 (service registry — container DNS canonical form)
#   Candidate F11 (first worked example: declarative state for Radarr + Prowlarr)

buildarr:
  watch_config: false
  update_days:
  - monday
  - tuesday
  - wednesday
  - thursday
  - friday
  - saturday
  - sunday
  update_times:
  - 03:00
