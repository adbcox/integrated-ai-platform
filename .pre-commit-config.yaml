repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        # ESPHome templates use !secret/!lambda/!include — pyyaml's safe_load
        # (used by check-yaml) doesn't know these constructors. Yamllint still
        # validates structure on these files.
        exclude: '^docs/.*|^config/phase-13/voice-satellite/.*\.yaml$'
      - id: check-json
        exclude: '^regressions/.*\.json$|^docs/phase-13/h1-rollback-state/.*'
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: detect-private-key
      # no-commit-to-branch omitted: single-developer platform commits on main

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.secrets\.baseline$|docs/phase-13/h1-rollback-state/.*|docs/phase-13/historical/.*|docs/phase-13/PHASE_13_FOUNDATION_AUDIT_2026-04-29\.md|docs/phase-13/PHASE_13_BLOCK_H1_RESULTS_2026-04-29\.md|docs/phase-13/h1-rewire-queue\.md|docs/phase-13/PHASE_13_BLOCK_H1_CHECKPOINT_2026-04-29\.md'

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: ['-c=.yamllint.yml']

  # ── Local repo-coherence drift checks (D-16-06) ────────────────────────
  # Each hook is scoped via `files:` so it only runs when the inputs it
  # depends on are staged. stdlib-only python; no install step.
  - repo: local
    hooks:
      - id: adr-readme-sync
        name: ADR files <-> docs/adr/README.md index
        entry: python3 scripts/check-repo-coherence.py adr-readme-sync
        language: system
        pass_filenames: false
        files: '^docs/adr/.*\.md$'
      - id: decision-register-sync
        name: ADR files <-> docs/DECISION_REGISTER.md
        entry: python3 scripts/check-repo-coherence.py decision-register-sync
        language: system
        pass_filenames: false
        files: '^docs/(adr/.*|DECISION_REGISTER)\.md$'
      - id: framework-table-coherence
        name: PROJECT_FRAMEWORK.md deliverable-table sanity
        entry: python3 scripts/check-repo-coherence.py framework-table-coherence
        language: system
        pass_filenames: false
        files: '^docs/PROJECT_FRAMEWORK\.md$'
      - id: launchd-recency
        name: launchd plists installed + recently active (D-16-04.1)
        entry: python3 scripts/check-repo-coherence.py launchd-recency
        language: system
        pass_filenames: false
        files: '^docker/launchd-agents/.*\.plist$'
      - id: mac-studio-reachable
        name: Mac Studio reachability (17.O Day-1 node)
        entry: python3 scripts/check-repo-coherence.py mac-studio-reachable
        language: system
        pass_filenames: false
        # Scoped to files that touch the Mac Studio node identity so we
        # don't false-positive every commit when the node is offline for
        # operator maintenance. CI runs the full suite unconditionally.
        files: '^(docs/runbooks/mac-studio-day-1\.md|docs/runbooks/headscale-client-onboarding\.md|scripts/check-repo-coherence\.py)$'
      - id: caddy-unbound-parity
        name: Caddy <-> Unbound DNS parity (17.I, status-file mode)
        entry: python3 scripts/check-repo-coherence.py caddy-unbound-parity
        language: system
        pass_filenames: false
        # Scoped to inputs that change the parity surface: Caddyfile (left
        # side) and the parity-check code itself. The hook is read-only —
        # it consumes a status file written by the operator-Mac refresh
        # job (cron/launchd), so pre-commit needs no OPNsense reachability
        # and no Vault credentials. Behavior:
        #   - status file missing  -> SKIP (operator hasn't refreshed yet)
        #   - status file stale    -> FAIL (silent-failure detection)
        #   - status reports drift -> FAIL with concrete gap report
        files: '^(docker/caddy/Caddyfile|scripts/(check-repo-coherence|opnsense_client)\.py)$'
