repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: '^docs/.*'
      - id: check-json
        exclude: '^regressions/.*\.json$|^docs/phase-13/h1-rollback-state/.*'
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: detect-private-key
      # no-commit-to-branch omitted: single-developer platform commits on main

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.secrets\.baseline$|docs/phase-13/h1-rollback-state/.*|docs/phase-13/historical/.*|docs/phase-13/PHASE_13_FOUNDATION_AUDIT_2026-04-29\.md|docs/phase-13/PHASE_13_BLOCK_H1_RESULTS_2026-04-29\.md|docs/phase-13/h1-rewire-queue\.md|docs/phase-13/PHASE_13_BLOCK_H1_CHECKPOINT_2026-04-29\.md'

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: ['-c=.yamllint.yml']
